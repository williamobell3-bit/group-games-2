// ═══ DRAWING CANVAS COMPONENT ═══
function DrawCanvas({isDrawer,onStroke,clearSig}){
  const cvs=useRef(null);
  const isDown=useRef(false);
  const lastPt=useRef(null);
  const [color,setColor]=useState('#fff');
  const [size,setSize]=useState(4);
  const [tool,setTool]=useState('pen'); // pen|eraser|fill
  const ctx=()=>cvs.current?.getContext('2d');

  useEffect(()=>{
    const c=cvs.current;if(!c)return;
    const cx=c.getContext('2d');
    c.width=c.offsetWidth;c.height=c.offsetHeight;
    cx.fillStyle='#1a1a2e';cx.fillRect(0,0,c.width,c.height);
  },[]);

  useEffect(()=>{
    const c=cvs.current;if(!c)return;
    const cx=c.getContext('2d');
    cx.fillStyle='#1a1a2e';cx.fillRect(0,0,c.width,c.height);
  },[clearSig]);

  function getPos(e){
    const c=cvs.current;const rect=c.getBoundingClientRect();
    const touch=e.touches?e.touches[0]:e;
    return {x:(touch.clientX-rect.left)*(c.width/rect.width),y:(touch.clientY-rect.top)*(c.height/rect.height)};
  }

  function startDraw(e){
    if(!isDrawer)return;e.preventDefault();
    isDown.current=true;lastPt.current=getPos(e);
    if(tool==='fill'){floodFill(getPos(e));return;}
    const cx=ctx();if(!cx)return;
    cx.beginPath();cx.arc(lastPt.current.x,lastPt.current.y,size/2,0,Math.PI*2);
    cx.fillStyle=tool==='eraser'?'#1a1a2e':color;cx.fill();
    onStroke({type:'dot',x:lastPt.current.x,y:lastPt.current.y,color:tool==='eraser'?'#1a1a2e':color,size});
  }

  function moveDraw(e){
    if(!isDrawer||!isDown.current)return;e.preventDefault();
    if(tool==='fill')return;
    const pt=getPos(e);const cx=ctx();if(!cx||!lastPt.current)return;
    cx.beginPath();cx.moveTo(lastPt.current.x,lastPt.current.y);cx.lineTo(pt.x,pt.y);
    cx.strokeStyle=tool==='eraser'?'#1a1a2e':color;cx.lineWidth=size;
    cx.lineCap='round';cx.lineJoin='round';cx.stroke();
    onStroke({type:'line',x1:lastPt.current.x,y1:lastPt.current.y,x2:pt.x,y2:pt.y,color:tool==='eraser'?'#1a1a2e':color,size});
    lastPt.current=pt;
  }

  function floodFill({x,y}){
    const c=cvs.current;const cx=c.getContext('2d');
    const imgData=cx.getImageData(0,0,c.width,c.height);
    const data=imgData.data;
    const idx=(px,py)=>(py*c.width+px)*4;
    const si=idx(Math.floor(x),Math.floor(y));
    const [tr,tg,tb]=[data[si],data[si+1],data[si+2]];
    const fillRGB=hexToRgb(color)||[255,255,255];
    if(tr===fillRGB[0]&&tg===fillRGB[1]&&tb===fillRGB[2])return;
    const stack=[[Math.floor(x),Math.floor(y)]];
    const match=(i)=>data[i]===tr&&data[i+1]===tg&&data[i+2]===tb;
    while(stack.length){
      const [px,py]=stack.pop();
      if(px<0||py<0||px>=c.width||py>=c.height)continue;
      const i=idx(px,py);if(!match(i))continue;
      data[i]=fillRGB[0];data[i+1]=fillRGB[1];data[i+2]=fillRGB[2];data[i+3]=255;
      stack.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
    }
    cx.putImageData(imgData,0,0);
    onStroke({type:'fill',x,y,color});
  }

  function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];}

  function endDraw(){isDown.current=false;lastPt.current=null;}

  // Receive external strokes
  DrawCanvas.applyStroke=(cvs,stroke)=>{
    const c=cvs;if(!c)return;
    const cx=c.getContext('2d');
    if(!cx)return;
    if(stroke.type==='dot'){cx.beginPath();cx.arc(stroke.x,stroke.y,stroke.size/2,0,Math.PI*2);cx.fillStyle=stroke.color;cx.fill();}
    else if(stroke.type==='line'){cx.beginPath();cx.moveTo(stroke.x1,stroke.y1);cx.lineTo(stroke.x2,stroke.y2);cx.strokeStyle=stroke.color;cx.lineWidth=stroke.size;cx.lineCap='round';cx.lineJoin='round';cx.stroke();}
    else if(stroke.type==='clear'){cx.fillStyle='#1a1a2e';cx.fillRect(0,0,c.width,c.height);}
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:8,height:'100%'}}>
      {isDrawer&&(
        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',padding:'0 2px'}}>
          {/* Tools */}
          <div className={`tool-btn${tool==='pen'?' active':''}`} onClick={()=>setTool('pen')} title="Pen">✏️</div>
          <div className={`tool-btn${tool==='eraser'?' active':''}`} onClick={()=>setTool('eraser')} title="Eraser">🧹</div>
          <div className={`tool-btn${tool==='fill'?' active':''}`} onClick={()=>setTool('fill')} title="Fill">🪣</div>
          <div style={{width:1,height:28,background:'rgba(255,255,255,0.1)',margin:'0 2px'}}/>
          {/* Sizes */}
          {[2,4,8,14].map(s=>(
            <div key={s} onClick={()=>setSize(s)} style={{width:30,height:30,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',background:size===s?'rgba(255,107,203,0.2)':'rgba(255,255,255,0.06)',border:`2px solid ${size===s?PINK:'transparent'}`}}>
              <div style={{width:s/2+2,height:s/2+2,borderRadius:'50%',background:color}}/>
            </div>
          ))}
          <div style={{width:1,height:28,background:'rgba(255,255,255,0.1)',margin:'0 2px'}}/>
          {/* Colors */}
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {DRAW_COLORS.map(c=>(
              <div key={c} className={`color-swatch${color===c?' active':''}`} onClick={()=>{setColor(c);setTool('pen');}} style={{background:c}}/>
            ))}
          </div>
          <div style={{marginLeft:'auto'}}>
            <button className="btn" onClick={()=>onStroke({type:'clear'})} style={{padding:'6px 14px',background:'rgba(239,71,111,0.15)',color:'#EF476F',fontSize:13,border:'1px solid rgba(239,71,111,0.3)'}}>🗑️ Clear</button>
          </div>
        </div>
      )}
      <canvas id="canvas" ref={cvs} style={{flex:1,width:'100%',background:'#1a1a2e',cursor:isDrawer?(tool==='eraser'?'cell':tool==='fill'?'crosshair':'crosshair'):'default'}}
        onMouseDown={startDraw} onMouseMove={moveDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={moveDraw} onTouchEnd={endDraw}/>
    </div>
  );
}
DrawCanvas.applyStroke=()=>{};

// ═══ GAME ═══
function Game({players,myId,isHost,channel,onEnd}){
  const [round,setRound]=useState(0);
  const [drawerIdx,setDrawerIdx]=useState(0);
  const [phase,setPhase]=useState('choosing'); // choosing|drawing|reveal
  const [word,setWord]=useState('');
  const [wordChoice,setWordChoice]=useState([]);
  const [timeLeft,setTimeLeft]=useState(ROUND_TIME);
  const [guesses,setGuesses]=useState([]);
  const [myGuess,setMyGuess]=useState('');
  const [correctGuessers,setCorrectGuessers]=useState([]);
  const [scores,setScores]=useState(()=>Object.fromEntries(players.map(p=>[p.id,0])));
  const [clearSig,setClearSig]=useState(0);
  const [timerKey,setTimerKey]=useState(0);
  const cvs=useRef(null);
  const timerRef=useRef(null);

  const drawer=players[drawerIdx%players.length];
  const amDrawer=drawer?.id===myId;
  const totalRounds=players.length; // each player draws once

  useEffect(()=>{
    if(!channel)return;
    channel
      .on('broadcast',{event:'word_choices'},(msg)=>{ if(!amDrawer)return; setWordChoice(msg.payload.words||[]); })
      .on('broadcast',{event:'word_chosen'},(msg)=>{ setWord(msg.payload.word||''); setPhase('drawing'); setTimerKey(k=>k+1); })
      .on('broadcast',{event:'stroke'},(msg)=>{ if(amDrawer)return; if(cvs.current)DrawCanvas.applyStroke(cvs.current,msg.payload); })
      .on('broadcast',{event:'guess'},(msg)=>{ 
        const {name,text,correct,gid}=msg.payload;
        setGuesses(g=>[...g,{name,text,correct,gid}]);
        if(correct){ setCorrectGuessers(c=>[...c,gid]); setScores(s=>({...s,[gid]:(s[gid]||0)+Math.max(100-correctGuessers.length*20,10)}));}
      })
      .on('broadcast',{event:'next_round'},(msg)=>{ advanceRound(msg.payload.di); })
      .on('broadcast',{event:'game_end'},()=>{ onEnd(scores); });
  },[channel,amDrawer]);

  useEffect(()=>{
    if(phase!=='drawing')return;
    clearInterval(timerRef.current);
    let t=ROUND_TIME;setTimeLeft(t);
    timerRef.current=setInterval(()=>{t--;setTimeLeft(t);if(t<=0){clearInterval(timerRef.current);endRound();}},1000);
    return ()=>clearInterval(timerRef.current);
  },[phase,round]);

  function startRound(di){
    setDrawerIdx(di);setWord('');setWordChoice([]);setGuesses([]);setCorrectGuessers([]);setClearSig(s=>s+1);
    setPhase('choosing');
    if(players[di]?.id===myId){
      // Give drawer 3 word choices
      const shuffled=[...WORDS].sort(()=>Math.random()-0.5).slice(0,3);
      setWordChoice(shuffled);
      channel?.send({type:'broadcast',event:'word_choices',payload:{words:shuffled}});
    }
  }

  useEffect(()=>{ if(isHost)startRound(0); },[]);

  function chooseWord(w){
    setWord(w);setPhase('drawing');setTimerKey(k=>k+1);
    channel?.send({type:'broadcast',event:'word_chosen',payload:{word:w}});
  }

  function endRound(){
    clearInterval(timerRef.current);
    setPhase('reveal');
    // Add points for drawer based on correct guessers
    if(drawer)setScores(s=>({...s,[drawer.id]:(s[drawer.id]||0)+correctGuessers.length*30}));
    setTimeout(()=>{
      if(!isHost)return;
      const nextDi=(drawerIdx+1)%players.length;
      const nextRound=round+1;
      if(nextRound>=totalRounds){ channel?.send({type:'broadcast',event:'game_end',payload:{}}); onEnd(scores); }
      else{ channel?.send({type:'broadcast',event:'next_round',payload:{di:nextDi}}); advanceRound(nextDi); }
    },4000);
  }

  function advanceRound(di){
    setRound(r=>r+1);
    startRound(di);
  }

  function handleStroke(stroke){
    if(!amDrawer)return;
    if(cvs.current)DrawCanvas.applyStroke(cvs.current,stroke);
    channel?.send({type:'broadcast',event:'stroke',payload:stroke});
    if(stroke.type==='clear')setClearSig(s=>s+1);
  }

  function submitGuess(e){
    e.preventDefault();
    const g=myGuess.trim();if(!g||amDrawer||correctGuessers.includes(myId))return;
    const correct=phase==='drawing'&&normalise(g)===normalise(word);
    const payload={name:players.find(p=>p.id===myId)?.name||'?',text:correct?'✓ Correct!':g,correct,gid:myId};
    setGuesses(gs=>[...gs,payload]);
    if(correct)setCorrectGuessers(c=>[...c,myId]);
    channel?.send({type:'broadcast',event:'guess',payload});
    setMyGuess('');
    if(correct)setScores(s=>({...s,[myId]:(s[myId]||0)+Math.max(100-correctGuessers.length*20,10)}));
  }

  const timerPct=timeLeft/ROUND_TIME;
  const timerColor=timerPct>0.5?G:timerPct>0.25?Y:R;
  const wordDisplay=amDrawer?word:(phase==='drawing'?'_ '.repeat(word.length).trim():word);

  // Choosing phase
  if(phase==='choosing') return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',padding:20,position:'relative',zIndex:1}}>
      {amDrawer?(
        <div style={{textAlign:'center',animation:'popIn 0.4s ease-out'}}>
          <div style={{fontSize:36,marginBottom:8}}>🎨</div>
          <div style={{fontSize:22,fontWeight:700,marginBottom:20}}>Pick a word to draw!</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {wordChoice.map(w=>(
              <button key={w} className="btn" onClick={()=>chooseWord(w)}
                style={{padding:'16px 40px',fontSize:20,background:'rgba(255,255,255,0.08)',color:'#fff',border:'2px solid rgba(255,107,203,0.3)',fontFamily:'Fredoka'}}>
                {w}
              </button>
            ))}
          </div>
        </div>
      ):(
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:40,animation:'pulse 1.5s infinite'}}>⏳</div>
          <div style={{fontSize:20,fontWeight:700,marginTop:12}}>{drawer?.name} is choosing a word...</div>
          <div style={{fontSize:14,color:'#888',marginTop:8}}>Get ready to guess!</div>
        </div>
      )}
    </div>
  );

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
      {/* Top bar */}
      <div style={{padding:'8px 12px',background:'rgba(0,0,0,0.4)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexShrink:0}}>
        <div style={{fontSize:13,color:'#888'}}>Round {round+1}/{totalRounds}</div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:phase==='drawing'?20:18,fontWeight:700,color:amDrawer?PINK:'#fff',letterSpacing:amDrawer?2:4}}>
            {wordDisplay}
          </div>
          {amDrawer&&<div style={{fontSize:11,color:'#888'}}>You're drawing!</div>}
        </div>
        <div style={{fontSize:14,fontWeight:700,color:timerColor}}>{timeLeft}s</div>
      </div>

      {/* Timer */}
      <div style={{background:'rgba(255,255,255,0.06)',height:4,flexShrink:0}}>
        <div key={timerKey} style={{height:'100%',background:`linear-gradient(90deg,${timerColor},${timerColor}88)`,
          animation:phase==='drawing'?`timerShrink ${ROUND_TIME}s linear forwards`:'none'}}/>
      </div>

      {/* Main area */}
      <div style={{flex:1,display:'flex',gap:0,overflow:'hidden'}}>
        {/* Canvas */}
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:8,minWidth:0}} ref={r=>{if(r&&!cvs.current){cvs.current=r.querySelector('canvas');}}}>
          <DrawCanvas isDrawer={amDrawer} onStroke={handleStroke} clearSig={clearSig}/>
        </div>

        {/* Side: scores + guesses */}
        <div style={{width:160,display:'flex',flexDirection:'column',background:'rgba(0,0,0,0.3)',borderLeft:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
          {/* Scores */}
          <div style={{padding:10,borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
            {[...players].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0)).map((p,i)=>(
              <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <span style={{fontSize:12,color:p.id===myId?PINK:drawer?.id===p.id?Y:'#aaa',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:90,fontWeight:p.id===myId?700:400}}>
                  {drawer?.id===p.id?'✏️ ':correctGuessers.includes(p.id)?'✓ ':''}{p.name}
                </span>
                <span style={{fontSize:12,color:Y,fontWeight:700}}>{scores[p.id]||0}</span>
              </div>
            ))}
          </div>

          {/* Guesses */}
          <div style={{flex:1,overflowY:'auto',padding:8,display:'flex',flexDirection:'column',gap:3}}>
            {guesses.slice(-20).map((g,i)=>(
              <div key={i} className="guess-msg" style={{background:g.correct?`${G}22`:'rgba(255,255,255,0.05)',borderRadius:8,padding:'5px 8px',fontSize:12,color:g.correct?G:'#aaa',border:g.correct?`1px solid ${G}44`:'none'}}>
                <span style={{color:g.gid===myId?PINK:'#777',fontWeight:700}}>{g.name}: </span>{g.text}
              </div>
            ))}
          </div>

          {/* Guess input */}
          {!amDrawer&&phase==='drawing'&&(
            <form onSubmit={submitGuess} style={{padding:8,borderTop:'1px solid rgba(255,255,255,0.06)'}}>
              <input className="inp" value={myGuess} onChange={e=>setMyGuess(e.target.value)} placeholder="Guess..."
                disabled={correctGuessers.includes(myId)}
                style={{fontSize:13,padding:'8px 10px',borderRadius:8,opacity:correctGuessers.includes(myId)?0.5:1}}/>
            </form>
          )}
          {correctGuessers.includes(myId)&&phase==='drawing'&&(
            <div style={{padding:8,textAlign:'center',fontSize:13,color:G,fontWeight:700,animation:'pulse 1s infinite'}}>✓ You got it!</div>
          )}
        </div>
      </div>

      {/* Reveal overlay */}
      {phase==='reveal'&&(
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:10}}>
          <div style={{textAlign:'center',animation:'popIn 0.4s ease-out'}}>
            <div style={{fontSize:48,marginBottom:8}}>🎭</div>
            <div style={{fontSize:28,fontWeight:700,marginBottom:4}}>The word was: <span style={{color:PINK}}>{word}</span></div>
            <div style={{fontSize:15,color:'#888'}}>{correctGuessers.length} players guessed it!</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══ END ═══
function EndScreen({players,scores,myId,onHome}){
  const sorted=[...players].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  return(
    <div style={{minHeight:'100vh',position:'relative',zIndex:1,padding:20,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{maxWidth:400,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:52,marginBottom:8}}>🎨</div>
        <div style={{fontSize:28,fontWeight:700,marginBottom:20}}>Game Over!</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
          {sorted.map((p,i)=>(
            <div key={p.id} className="card" style={{padding:'14px 18px',display:'flex',alignItems:'center',gap:12,
              borderColor:i===0?`${PINK}44`:'rgba(255,255,255,0.08)',background:i===0?`${PINK}0a`:'rgba(255,255,255,0.04)',animation:`fadeIn 0.4s ease-out ${i*0.1}s both`}}>
              <span style={{fontSize:20}}>{['🥇','🥈','🥉'][i]||`#${i+1}`}</span>
              <span style={{flex:1,fontWeight:p.id===myId?700:500,color:p.id===myId?PINK:'#fff'}}>{p.name}</span>
              <span style={{color:Y,fontWeight:700,fontSize:18}}>{scores[p.id]||0}</span>
            </div>
          ))}
        </div>
        <button className="btn" onClick={onHome} style={{padding:'13px 40px',fontSize:16,background:`linear-gradient(135deg,${PINK},${R})`,color:'#fff'}}>← Home</button>
      </div>
    </div>
  );
}

// ═══ ROOT ═══
function App(){
  const [screen,setScreen]=useState('home');
  const [myId]=useState(uid2);
  const [players,setPlayers]=useState([]);
  const [roomCode,setRoomCode]=useState('');
  const [isHost,setIsHost]=useState(false);
  const [channel,setChannel]=useState(null);
  const [finalScores,setFinalScores]=useState({});

  function connect(code,name,host){
    if(!db||SUPA_KEY==='YOUR_ANON_KEY_HERE'){
      // Demo: 2 fake players
      const me={id:myId,name};
      const bot={id:'bot1',name:'DrawBot'};
      setPlayers([me,bot]);setRoomCode(code);setIsHost(host);setChannel(null);setScreen('lobby');
      return;
    }
    const ch=db.channel(`draw-${code}`,{config:{broadcast:{self:false}}});
    const me={id:myId,name,isHost:host};
    ch.on('broadcast',{event:'joined'},(msg)=>{
      setPlayers(prev=>{if(prev.find(p=>p.id===msg.payload.id))return prev;return[...prev,msg.payload];});
    }).subscribe(async()=>{
      setChannel(ch);
      setPlayers([me]);
      await ch.send({type:'broadcast',event:'joined',payload:me});
    });
    setRoomCode(code);setIsHost(host);setScreen('lobby');
  }

  function onHost(name){connect(uid(),name,true);}
  function onJoin(code,name){connect(code,name,false);}
  function onStart(){setScreen('game');}
  function onEnd(scores){setFinalScores(scores);setScreen('end');}
  function reset(){setScreen('home');setPlayers([]);setChannel(null);}

  if(screen==='home')return <Home onHost={onHost} onJoin={onJoin}/>;
  if(screen==='lobby')return <Lobby code={roomCode} players={players} myId={myId} isHost={isHost} onStart={onStart} onLeave={reset}/>;
  if(screen==='game')return <Game players={players} myId={myId} isHost={isHost} channel={channel} onEnd={onEnd}/>;
  if(screen==='end')return <EndScreen players={players} scores={finalScores} myId={myId} onHome={reset}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
