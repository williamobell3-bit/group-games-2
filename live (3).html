<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Live — Group Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a14;font-family:'Fredoka',sans-serif;color:#fff;overflow:hidden;width:100vw;height:100vh}
    canvas{display:block;width:100%!important;height:100%!important}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{0%{transform:scale(0.4);opacity:0}65%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
    #ui{position:fixed;inset:0;pointer-events:none;z-index:10}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
    .panel{background:#0e0e22;border:1px solid rgba(255,255,255,0.1);border-radius:22px;padding:28px;max-width:440px;width:100%;animation:fadeIn 0.4s ease-out}
    .btn{font-family:'Fredoka',sans-serif;border:none;cursor:pointer;border-radius:13px;font-weight:700;transition:all 0.15s}
    .btn:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.1)}
    .btn:active:not(:disabled){transform:scale(0.97)}
    .btn:disabled{opacity:0.4;cursor:default}
    .inp{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:11px;color:#fff;font-family:'Fredoka',sans-serif;padding:11px 14px;font-size:15px;width:100%;outline:none;transition:border-color 0.2s}
    .inp:focus{border-color:#06D6A0}
    .inp::placeholder{color:rgba(255,255,255,0.3)}
    .name-tag{position:absolute;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:2px 8px;font-size:12px;font-weight:600;pointer-events:none;white-space:nowrap}
    #joystick-zone{position:fixed;bottom:20px;left:20px;width:120px;height:120px;pointer-events:all;z-index:20;opacity:0.7;display:none}
    #joystick-base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center}
    #joystick-thumb{width:44px;height:44px;border-radius:50%;background:rgba(6,214,160,0.7);border:2px solid #06D6A0;position:absolute;transition:box-shadow 0.1s}
    #jump-btn{position:fixed;bottom:30px;right:20px;width:70px;height:70px;border-radius:50%;background:rgba(58,134,255,0.4);border:2px solid #3A86FF;pointer-events:all;z-index:20;display:none;align-items:center;justify-content:center;font-size:22px;cursor:pointer;font-family:'Fredoka';font-weight:700;color:#fff;opacity:0.8}
  </style>
</head>
<body>
<!-- 3D Canvas -->
<div id="canvas-wrap" style="position:fixed;inset:0"></div>

<!-- UI Layer -->
<div id="ui">
  <!-- HUD -->
  <div id="hud" style="display:none;padding:12px 14px;position:fixed;top:0;left:0;right:0">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:8px 14px;min-width:140px">
        <div style="font-size:11px;color:#888;letter-spacing:1px;margin-bottom:4px">PLAYERS</div>
        <div id="player-list" style="display:flex;flex-direction:column;gap:3px"></div>
      </div>
      <div style="text-align:center">
        <div id="round-info" style="background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:6px 18px">
          <div style="font-size:11px;color:#888">REMAINING</div>
          <div id="alive-count" style="font-size:22px;font-weight:700;color:#fff">-</div>
        </div>
      </div>
      <div style="background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:8px 14px;text-align:right">
        <div style="font-size:11px;color:#888">CONTROLS</div>
        <div style="font-size:11px;color:#aaa">WASD/↑↓←→ Move</div>
        <div style="font-size:11px;color:#aaa">SPACE Jump</div>
      </div>
    </div>
  </div>
  <!-- Name tags overlay -->
  <div id="name-tags"></div>
  <!-- Kill feed -->
  <div id="kill-feed" style="position:fixed;top:80px;right:14px;display:flex;flex-direction:column;gap:4px;max-width:200px"></div>
  <!-- Toast -->
  <div id="toast" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:700;text-shadow:0 0 20px currentColor;opacity:0;transition:opacity 0.3s;pointer-events:none"></div>
</div>

<!-- Mobile controls -->
<div id="joystick-zone"><div id="joystick-base"><div id="joystick-thumb"></div></div></div>
<div id="jump-btn" onclick="doJump()">↑</div>

<!-- Menu Overlay -->
<div id="menu" class="overlay">
  <div class="panel" style="text-align:center">
    <div style="font-size:52px;margin-bottom:8px;animation:float 3s ease-in-out infinite">⚔️</div>
    <div style="font-size:34px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,#06D6A0,#3A86FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Live</div>
    <p style="color:#777;font-size:14px;margin-bottom:24px">3D arena · dodge obstacles · last one standing</p>
    <input class="inp" id="name-inp" placeholder="Your name..." style="margin-bottom:12px" value="">
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button class="btn" onclick="startSolo()" style="flex:1;padding:13px;fontSize:16px;background:linear-gradient(135deg,#06D6A0,#3A86FF);color:#fff;font-size:16px">⚔️ Solo vs Bots</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn" onclick="hostMP()" style="flex:1;padding:12px;background:linear-gradient(135deg,#EF476F,#FFD166);color:#fff;font-size:15px">🎮 Host</button>
      <div style="display:flex;gap:6px;flex:1">
        <input class="inp" id="room-inp" placeholder="Code" maxlength="6" style="text-align:center;font-size:18px;letter-spacing:3px;flex:1">
        <button class="btn" onclick="joinMP()" style="padding:11px 14px;background:rgba(58,134,255,0.3);color:#3A86FF;border:1px solid #3A86FF33;font-size:14px">Join</button>
      </div>
    </div>
    <a href="index.html" style="display:block;text-align:center;color:#555;font-size:13px;text-decoration:none;margin-top:8px">← Group Games</a>
  </div>
</div>

<!-- End Overlay -->
<div id="end-screen" class="overlay" style="display:none">
  <div class="panel" style="text-align:center">
    <div id="end-icon" style="font-size:56px;margin-bottom:8px;animation:float 3s ease-in-out infinite"></div>
    <div id="end-title" style="font-size:28px;font-weight:700;margin-bottom:4px"></div>
    <div id="end-sub" style="font-size:15px;color:#888;margin-bottom:24px"></div>
    <div id="end-podium" style="margin-bottom:20px"></div>
    <button class="btn" onclick="backToMenu()" style="padding:13px 40px;font-size:16px;background:linear-gradient(135deg,#06D6A0,#3A86FF);color:#fff">Play Again</button>
  </div>
</div>

<script>
const SUPA_URL='https://fphjilkiofiaipuaxptn.supabase.co';
const SUPA_KEY='YOUR_ANON_KEY_HERE';
let db=null;try{db=supabase.createClient(SUPA_URL,SUPA_KEY);}catch(e){}
const uid=()=>Math.random().toString(36).slice(2,10);

// ═══ THREE.JS SETUP ═══
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x050510,0.035);
scene.background=new THREE.Color(0x050510);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.9;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const camera=new THREE.PerspectiveCamera(65,1,0.1,500);
camera.position.set(0,16,-16);

// Resize
function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);resize();

// ═══ LIGHTS ═══
const ambient=new THREE.AmbientLight(0x111133,1.5);scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(10,20,5);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=0.5;sun.shadow.camera.far=100;
sun.shadow.camera.left=sun.shadow.camera.bottom=-25;sun.shadow.camera.right=sun.shadow.camera.top=25;
scene.add(sun);
const fill=new THREE.DirectionalLight(0x3333ff,0.4);fill.position.set(-10,5,-10);scene.add(fill);

// ═══ ARENA GEOMETRY ═══
const ARENA_R=11;const ARENA_Y=0;
const PLATFORMS=[
  {id:'main', x:0,y:ARENA_Y,z:0, rx:ARENA_R, type:'circle', color:0x1a1a3a},
  {id:'p1', x:0,y:ARENA_Y+2,z:0, rx:4, type:'circle', color:0x141428}, // raised center
  {id:'side1',x:ARENA_R*1.25,y:ARENA_Y-0.5,z:0, rx:3.5, type:'circle', color:0x12122a},
  {id:'side2',x:-ARENA_R*1.25,y:ARENA_Y-0.5,z:0, rx:3.5, type:'circle', color:0x12122a},
  {id:'side3',x:0,y:ARENA_Y-0.5,z:ARENA_R*1.25, rx:3.5, type:'circle', color:0x12122a},
  {id:'side4',x:0,y:ARENA_Y-0.5,z:-ARENA_R*1.25, rx:3.5, type:'circle', color:0x12122a},
];
const PLATFORM_H=0.7;
const platformMeshes=[];

PLATFORMS.forEach((p,i)=>{
  const geo=new THREE.CylinderGeometry(p.rx,p.rx,PLATFORM_H,p.type==='circle'?48:4);
  const mat=new THREE.MeshStandardMaterial({color:p.color,roughness:0.8,metalness:0.1});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(p.x,p.y,p.z);mesh.receiveShadow=true;scene.add(mesh);
  // Glowing edge ring
  const edgeGeo=new THREE.TorusGeometry(p.rx,0.06,8,80);
  const edgeMat=new THREE.MeshStandardMaterial({color:i===0?0x06D6A0:0x3A86FF,emissive:i===0?0x06D6A0:0x3A86FF,emissiveIntensity:1.5,roughness:0,metalness:0});
  const edge=new THREE.Mesh(edgeGeo,edgeMat);
  edge.position.set(p.x,p.y+PLATFORM_H/2+0.02,p.z);edge.rotation.x=Math.PI/2;scene.add(edge);
  // Grid lines on top
  const gridMat=new THREE.MeshStandardMaterial({color:0x333366,emissive:0x111133,emissiveIntensity:0.5,roughness:1,metalness:0});
  for(let g=-Math.floor(p.rx);g<=Math.floor(p.rx);g+=2){
    const gGeo=new THREE.BoxGeometry(0.04,0.01,p.rx*2-0.2);
    const gMesh=new THREE.Mesh(gGeo,gridMat);
    gMesh.position.set(p.x+g,p.y+PLATFORM_H/2+0.01,p.z);scene.add(gMesh);
    const gGeo2=new THREE.BoxGeometry(p.rx*2-0.2,0.01,0.04);
    const gMesh2=new THREE.Mesh(gGeo2,gridMat);
    gMesh2.position.set(p.x,p.y+PLATFORM_H/2+0.01,p.z+g);scene.add(gMesh2);
  }
  platformMeshes.push({mesh,p});
});

// Lava plane below
const lavaGeo=new THREE.PlaneGeometry(300,300);
const lavaMat=new THREE.MeshStandardMaterial({color:0x220000,emissive:0xff3300,emissiveIntensity:0.3,roughness:1});
const lava=new THREE.Mesh(lavaGeo,lavaMat);
lava.rotation.x=-Math.PI/2;lava.position.y=-15;scene.add(lava);
const lavaLight=new THREE.PointLight(0xff4400,2,40);lavaLight.position.y=-10;scene.add(lavaLight);

// Stars
const starGeo=new THREE.BufferGeometry();
const starVerts=[];for(let i=0;i<2000;i++)starVerts.push((Math.random()-0.5)*400,(Math.random()-0.5)*400,(Math.random()-0.5)*400);
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.3,sizeAttenuation:true});
scene.add(new THREE.Points(starGeo,starMat));

// ═══ OBSTACLES ═══
const obstacles=[];
const obsMat1=new THREE.MeshStandardMaterial({color:0xEF476F,emissive:0xEF476F,emissiveIntensity:0.8,roughness:0.3,metalness:0.5});
const obsMat2=new THREE.MeshStandardMaterial({color:0xFFD166,emissive:0xFFD166,emissiveIntensity:0.6,roughness:0.3,metalness:0.5});

// Rotating sweeper bars
[0,Math.PI/2,Math.PI,Math.PI*1.5].forEach((angle,i)=>{
  const geo=new THREE.BoxGeometry(ARENA_R*1.6,0.35,0.35);
  const mesh=new THREE.Mesh(geo,i%2===0?obsMat1:obsMat2);
  mesh.position.y=ARENA_Y+PLATFORM_H/2+0.4+i*0.5;
  mesh.castShadow=true;scene.add(mesh);
  obstacles.push({mesh,type:'sweeper',speed:0.008+(i*0.003),phase:angle,y:ARENA_Y+PLATFORM_H/2+0.4+i*0.5,radius:0.2});
});

// Bouncing hazards
for(let i=0;i<3;i++){
  const geo=new THREE.SphereGeometry(0.5,12,12);
  const mat=new THREE.MeshStandardMaterial({color:0xFFD166,emissive:0xFFD166,emissiveIntensity:0.8,roughness:0,metalness:0.2});
  const mesh=new THREE.Mesh(geo,mat);
  const angle=i*(Math.PI*2/3);
  mesh.position.set(Math.cos(angle)*7,ARENA_Y+PLATFORM_H/2+0.5,Math.sin(angle)*7);
  mesh.castShadow=true;scene.add(mesh);
  obstacles.push({mesh,type:'bouncer',angle,radius:7,speed:0.005+i*0.002,bobOffset:i*1.2});
}

// ═══ PLAYER DATA ═══
const COLORS=[0x06D6A0,0x3A86FF,0xEF476F,0xFFD166,0xFF6BCB,0xA78BFA,0x10B981,0xFB923C];
const PLAYER_NAMES=['Gloup','Blorp','Zorp','Snorp','Fizz','Buzz','Wump','Doop'];
let myId=uid(),myName='Player',myColor=COLORS[0];
let players={};  // id -> {mesh,light,name,id,alive,score,vel,onGround,bot,botState}
let myPlayer=null;
let gameActive=false;
let channel=null;
let broadcastInterval=null;
let cameraAngle=0;
let cameraHeight=14,cameraDist=14;

// Controls
const keys={};
document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>delete keys[e.code]);

// ═══ CREATE PLAYER MESH ═══
function createPlayerMesh(color){
  const group=new THREE.Group();
  // Body sphere
  const bodyGeo=new THREE.SphereGeometry(0.55,16,16);
  const bodyMat=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.3,roughness:0.4,metalness:0.1});
  const body=new THREE.Mesh(bodyGeo,bodyMat);body.castShadow=true;body.name='body';
  group.add(body);
  // Eyes
  const eyeGeo=new THREE.SphereGeometry(0.1,8,8);
  const eyeMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.5});
  [-0.2,0.2].forEach(ex=>{const eye=new THREE.Mesh(eyeGeo,eyeMat);eye.position.set(ex,0.15,0.47);group.add(eye);});
  // Pupil
  const pupilGeo=new THREE.SphereGeometry(0.05,6,6);const pupilMat=new THREE.MeshStandardMaterial({color:0x000000});
  [-0.2,0.2].forEach(ex=>{const p=new THREE.Mesh(pupilGeo,pupilMat);p.position.set(ex,0.15,0.55);group.add(p);});
  // Glow light
  const light=new THREE.PointLight(color,1.5,4);light.position.y=0.5;group.add(light);
  return group;
}

// ═══ SPAWN PLAYER ═══
function spawnPlayer(id,name,color,x,z,isBot=false){
  const mesh=createPlayerMesh(color);
  const spawnPlatform=PLATFORMS[0];
  mesh.position.set(x,spawnPlatform.y+PLATFORM_H+0.55,z);
  scene.add(mesh);
  const pd={id,name,color,mesh,alive:true,score:0,vel:new THREE.Vector3(),onGround:false,bot:isBot,botState:{target:null,timer:0},wobble:Math.random()*Math.PI*2};
  players[id]=pd;
  updateHUD();
  return pd;
}

// ═══ SPAWN MY PLAYER ═══
function spawnMe(){
  const angle=Math.random()*Math.PI*2;
  const r=5;
  const pd=spawnPlayer(myId,myName,myColor,Math.cos(angle)*r,Math.sin(angle)*r,false);
  myPlayer=pd;
}

// ═══ SPAWN BOTS ═══
function spawnBots(count){
  for(let i=0;i<count;i++){
    const angle=(i/(count))*Math.PI*2;const r=6+i%2*2;
    const color=COLORS[(i+1)%COLORS.length];
    const name=PLAYER_NAMES[i%PLAYER_NAMES.length];
    const id='bot_'+uid();
    spawnPlayer(id,name,color,Math.cos(angle)*r,Math.sin(angle)*r,true);
  }
}

// ═══ PLATFORM COLLISION ═══
function isOnPlatform(pos){
  for(const {p} of platformMeshes){
    const dx=pos.x-p.x,dz=pos.z-p.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<=p.rx-0.3){const top=p.y+PLATFORM_H/2;if(pos.y>top-0.2&&pos.y<top+0.8){return top;}}
  }
  return null;
}

// ═══ OBSTACLE COLLISION ═══
function checkObstacleHit(pd){
  const pos=pd.mesh.position;
  for(const obs of obstacles){
    const op=obs.mesh.position;
    const dx=pos.x-op.x,dy=pos.y-op.y,dz=pos.z-op.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const hitR=(obs.type==='sweeper')?0.7:1.1;
    if(dist<hitR&&Math.abs(dy)<1){
      // Push player away from obstacle
      const pushDir=new THREE.Vector3(dx,0.3,dz).normalize();
      pd.vel.add(pushDir.multiplyScalar(0.15));
      if(dist<0.5)eliminatePlayer(pd.id,'obstacle');
    }
  }
}

// ═══ BOT AI ═══
function updateBot(pd){
  const b=pd.botState;
  b.timer-=1;
  if(b.timer<=0){
    // Pick new wander target
    const angle=Math.random()*Math.PI*2;
    const r=Math.random()*7;
    b.target=new THREE.Vector3(Math.cos(angle)*r,0,Math.sin(angle)*r);
    b.timer=60+Math.random()*80;
  }
  if(b.target){
    const dx=b.target.x-pd.mesh.position.x;
    const dz=b.target.z-pd.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>0.5){
      pd.vel.x+=dx/dist*0.012;
      pd.vel.z+=dz/dist*0.012;
    }
  }
  // Random jump
  if(pd.onGround&&Math.random()<0.006){pd.vel.y=0.2;}
  // Avoid edges
  const edgeDist=Math.sqrt(pd.mesh.position.x**2+pd.mesh.position.z**2);
  if(edgeDist>ARENA_R*0.8){
    pd.vel.x-=pd.mesh.position.x/edgeDist*0.03;
    pd.vel.z-=pd.mesh.position.z/edgeDist*0.03;
  }
}

// ═══ PHYSICS ═══
function updatePhysics(pd){
  const GRAVITY=0.012,DRAG=0.88,SPEED=0.04,JUMP=0.22;
  // Apply gravity
  pd.vel.y-=GRAVITY;
  // Movement input (only for my player)
  if(pd.id===myId&&!pd.bot){
    const forward=new THREE.Vector3(-Math.sin(cameraAngle),0,-Math.cos(cameraAngle));
    const right=new THREE.Vector3(Math.cos(cameraAngle),0,-Math.sin(cameraAngle));
    const moveVec=new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])moveVec.add(forward);
    if(keys['KeyS']||keys['ArrowDown'])moveVec.sub(forward);
    if(keys['KeyD']||keys['ArrowRight'])moveVec.add(right);
    if(keys['KeyA']||keys['ArrowLeft'])moveVec.sub(right);
    // Joystick
    if(joyX!==0||joyY!==0){moveVec.add(new THREE.Vector3(-Math.sin(cameraAngle)*-joyY+Math.cos(cameraAngle)*joyX,0,-Math.cos(cameraAngle)*-joyY+-Math.sin(cameraAngle)*joyX));}
    if(moveVec.length()>0){moveVec.normalize();pd.vel.x+=moveVec.x*SPEED;pd.vel.z+=moveVec.z*SPEED;}
    if((keys['Space']||keys['KeySpace'])&&pd.onGround){doJump();}
  }
  // Horizontal drag
  pd.vel.x*=DRAG;pd.vel.z*=DRAG;
  // Clamp horizontal speed
  const hspd=Math.sqrt(pd.vel.x**2+pd.vel.z**2);if(hspd>0.35){pd.vel.x*=0.35/hspd;pd.vel.z*=0.35/hspd;}
  // Move
  pd.mesh.position.add(pd.vel);
  // Platform collision
  const platTop=isOnPlatform(pd.mesh.position);
  if(platTop!==null&&pd.vel.y<0){
    pd.mesh.position.y=platTop+0.55;pd.vel.y=0;pd.onGround=true;
  } else {pd.onGround=false;}
  // Face direction of movement
  if(Math.abs(pd.vel.x)>0.01||Math.abs(pd.vel.z)>0.01){
    const angle=Math.atan2(pd.vel.x,pd.vel.z);pd.mesh.rotation.y=angle;
  }
  // Wobble while in air
  pd.wobble+=0.1;if(!pd.onGround){pd.mesh.children[0]&&(pd.mesh.children[0].rotation.z=Math.sin(pd.wobble)*0.15);}
  else{pd.mesh.children[0]&&(pd.mesh.children[0].rotation.z*=0.9);}
  // Fall out
  if(pd.mesh.position.y<-8&&pd.alive){eliminatePlayer(pd.id,'fall');}
}

function doJump(){if(myPlayer?.onGround){myPlayer.vel.y=JUMP_FORCE;}}
const JUMP_FORCE=0.22;

// ═══ CAMERA ═══
function updateCamera(){
  if(!myPlayer||!myPlayer.alive)return;
  // Rotate with Q/E or arrow left/right if no movement
  if(keys['KeyQ'])cameraAngle+=0.03;if(keys['KeyE'])cameraAngle-=0.03;
  // Follow player
  const target=myPlayer.mesh.position;
  const camX=target.x+Math.sin(cameraAngle)*cameraDist;
  const camZ=target.z+Math.cos(cameraAngle)*cameraDist;
  const camY=target.y+cameraHeight;
  camera.position.lerp(new THREE.Vector3(camX,camY,camZ),0.08);
  camera.lookAt(target.x,target.y+1,target.z);
}

// ═══ OBSTACLES ANIMATION ═══
function updateObstacles(){
  const t=Date.now()/1000;
  obstacles.forEach(obs=>{
    if(obs.type==='sweeper'){
      obs.phase+=obs.speed;
      obs.mesh.rotation.y=obs.phase;
    } else if(obs.type==='bouncer'){
      obs.angle+=obs.speed;
      obs.mesh.position.x=Math.cos(obs.angle)*obs.radius;
      obs.mesh.position.z=Math.sin(obs.angle)*obs.radius;
      obs.mesh.position.y=ARENA_Y+PLATFORM_H/2+0.5+Math.sin(t*2+obs.bobOffset)*0.8;
    }
  });
}

// ═══ NAME TAGS ═══
function updateNameTags(){
  const tags=document.getElementById('name-tags');
  tags.innerHTML='';
  Object.values(players).forEach(pd=>{
    if(!pd.alive)return;
    const pos=pd.mesh.position.clone();
    pos.y+=1.2;
    const projected=pos.project(camera);
    const x=(projected.x*0.5+0.5)*window.innerWidth;
    const y=(-projected.y*0.5+0.5)*window.innerHeight;
    if(projected.z>1)return;
    const el=document.createElement('div');
    el.className='name-tag';
    el.style.left=x+'px';el.style.top=y+'px';
    el.style.color='#'+pd.color.toString(16).padStart(6,'0');
    el.style.borderColor='#'+pd.color.toString(16).padStart(6,'0')+'88';
    el.textContent=(pd.id===myId?'★ ':'')+pd.name;
    tags.appendChild(el);
  });
}

// ═══ HUD ═══
function updateHUD(){
  const alive=Object.values(players).filter(p=>p.alive);
  document.getElementById('alive-count').textContent=alive.length;
  const list=document.getElementById('player-list');
  list.innerHTML=alive.slice(0,6).map(p=>`<div style="font-size:12px;color:#${p.color.toString(16).padStart(6,'0')};font-weight:${p.id===myId?700:400}">${p.id===myId?'★ ':''} ${p.name}</div>`).join('');
}

// ═══ KILL FEED ═══
function showKillFeed(name,reason){
  const kf=document.getElementById('kill-feed');
  const el=document.createElement('div');
  el.style.cssText='background:rgba(0,0,0,0.6);border-radius:8px;padding:5px 10px;font-size:13px;animation:fadeIn 0.3s ease-out;border:1px solid rgba(255,255,255,0.1)';
  el.textContent=reason==='fall'?`💀 ${name} fell off!`:`💥 ${name} was knocked out!`;
  kf.appendChild(el);setTimeout(()=>el.remove(),3000);
  if(kf.children.length>4)kf.children[0].remove();
}

// ═══ TOAST ═══
function showToast(text,color='#fff'){
  const t=document.getElementById('toast');
  t.textContent=text;t.style.color=color;t.style.opacity=1;
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity=0,2000);
}

// ═══ ELIMINATE ═══
function eliminatePlayer(id,reason){
  const pd=players[id];if(!pd||!pd.alive)return;
  pd.alive=false;
  showKillFeed(pd.name,reason);
  // Death particles
  for(let i=0;i<20;i++){
    const geo=new THREE.SphereGeometry(0.08,4,4);
    const mat=new THREE.MeshStandardMaterial({color:pd.color,emissive:pd.color,emissiveIntensity:2});
    const mesh=new THREE.Mesh(geo,mat);mesh.position.copy(pd.mesh.position);
    scene.add(mesh);
    const vel=new THREE.Vector3((Math.random()-0.5)*0.3,(Math.random()*0.2+0.05),(Math.random()-0.5)*0.3);
    let life=40;const anim=setInterval(()=>{mesh.position.add(vel);vel.y-=0.008;life--;mesh.material.opacity=life/40;if(life<=0){scene.remove(mesh);clearInterval(anim);}},16);
  }
  pd.mesh.visible=false;
  if(id===myId){showToast('💀 You fell!','#EF476F');cameraHeight=22;cameraDist=20;}
  updateHUD();
  checkWin();
}

function checkWin(){
  const alive=Object.values(players).filter(p=>p.alive);
  if(alive.length<=1&&gameActive){
    gameActive=false;
    clearInterval(broadcastInterval);
    const winner=alive[0];
    setTimeout(()=>showEnd(winner),1000);
  }
}

// ═══ END SCREEN ═══
function showEnd(winner){
  const iWon=winner?.id===myId;
  const sorted=Object.values(players).sort((a,b)=>b.score-a.score);
  document.getElementById('end-icon').textContent=iWon?'🏆':'💀';
  document.getElementById('end-title').textContent=iWon?'You Win!':winner?.name+' wins!';
  document.getElementById('end-sub').textContent=iWon?'Last one standing! 🎉':'Better luck next time!';
  const podium=sorted.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,${i===0?0.06:0.02});border-radius:10px;margin-bottom:6px">
    <span style="font-size:16px">${['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'][i]||`#${i+1}`}</span>
    <span style="flex:1;color:#${ p.color.toString(16).padStart(6,'0')};font-weight:${p.id===myId?700:500}">${p.name}</span>
    <span style="color:#888;font-size:13px">${p.alive?'👑 ALIVE':'💀'}</span>
  </div>`).join('');
  document.getElementById('end-podium').innerHTML=podium;
  document.getElementById('end-screen').style.display='flex';
  if(iWon){launchConfetti();}
}

function launchConfetti(){
  const colors=['#06D6A0','#3A86FF','#EF476F','#FFD166','#FF6BCB'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;left:${Math.random()*100}%;top:-10px;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;background:${colors[i%5]};border-radius:${Math.random()>0.5?'50%':'2px'};animation:confetti ${2+Math.random()*2}s ease-in ${Math.random()*0.8}s forwards;z-index:999;pointer-events:none`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),5000);
  }
}

// ═══ GAME MODES ═══
function startSolo(){
  const name=document.getElementById('name-inp').value.trim()||'Player';
  myName=name;myColor=COLORS[0];
  document.getElementById('menu').style.display='none';
  document.getElementById('hud').style.display='block';
  resetGame();spawnMe();spawnBots(5);
  showToast('⚔️ Go!','#06D6A0');
  gameActive=true;
  // Check mobile
  if('ontouchstart' in window){
    document.getElementById('joystick-zone').style.display='block';
    document.getElementById('jump-btn').style.display='flex';
  }
}

async function hostMP(){
  const name=document.getElementById('name-inp').value.trim()||'Player';
  myName=name;myColor=COLORS[0];
  const code=Math.random().toString(36).slice(2,8).toUpperCase();
  document.getElementById('room-inp').value=code;
  document.getElementById('menu').style.display='none';
  document.getElementById('hud').style.display='block';
  setupChannel(code,true);resetGame();spawnMe();
  showToast('Room: '+code,'#FFD166');gameActive=true;
}

async function joinMP(){
  const code=document.getElementById('room-inp').value.trim().toUpperCase();
  const name=document.getElementById('name-inp').value.trim()||'Player';
  if(!code){alert('Enter room code!');return;}
  myName=name;myColor=COLORS[Object.keys(players).length%COLORS.length];
  document.getElementById('menu').style.display='none';
  document.getElementById('hud').style.display='block';
  setupChannel(code,false);resetGame();spawnMe();
  showToast('Joined: '+code,'#3A86FF');gameActive=true;
}

function resetGame(){
  Object.values(players).forEach(pd=>scene.remove(pd.mesh));
  players={};myPlayer=null;cameraHeight=14;cameraDist=14;
  document.getElementById('end-screen').style.display='none';
}

function backToMenu(){
  document.getElementById('end-screen').style.display='none';
  document.getElementById('menu').style.display='flex';
  document.getElementById('hud').style.display='none';
  resetGame();gameActive=false;
  clearInterval(broadcastInterval);
  channel?.unsubscribe?.();channel=null;
}

// ═══ SUPABASE MULTIPLAYER ═══
function setupChannel(code,isHost){
  if(!db||SUPA_KEY==='YOUR_ANON_KEY_HERE'){showToast('Add Supabase key for multiplayer!','#FFD166');return;}
  channel=db.channel(`live-arena-${code}`,{config:{broadcast:{self:false}}});
  channel.on('broadcast',{event:'player_state'},(msg)=>{
    const d=msg.payload;
    if(d.id===myId)return;
    if(!players[d.id]){
      const color=COLORS[Object.keys(players).length%COLORS.length];
      spawnPlayer(d.id,d.name,color,d.x,d.z,false);
    }
    const pd=players[d.id];if(!pd)return;
    pd.mesh.position.lerp(new THREE.Vector3(d.x,d.y,d.z),0.3);
    if(!d.alive&&pd.alive)eliminatePlayer(d.id,'fall');
  }).subscribe();
  // Broadcast my position
  broadcastInterval=setInterval(()=>{
    if(!myPlayer)return;
    channel.send({type:'broadcast',event:'player_state',payload:{
      id:myId,name:myName,x:myPlayer.mesh.position.x,y:myPlayer.mesh.position.y,z:myPlayer.mesh.position.z,alive:myPlayer.alive
    }});
  },50);
}

// ═══ JOYSTICK ═══
let joyX=0,joyY=0,joyActive=false,joyStart={x:0,y:0};
const joyZone=document.getElementById('joystick-zone');
const joyThumb=document.getElementById('joystick-thumb');
function joyMove(cx,cy){
  const r=joyZone.getBoundingClientRect();
  const cx2=r.left+r.width/2,cy2=r.top+r.height/2;
  let dx=cx-cx2,dy=cy-cy2;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const maxR=40;if(dist>maxR){dx*=maxR/dist;dy*=maxR/dist;}
  joyX=dx/maxR;joyY=dy/maxR;
  joyThumb.style.transform=`translate(${dx}px,${dy}px)`;
}
joyZone.addEventListener('touchstart',e=>{joyMove(e.touches[0].clientX,e.touches[0].clientY);joyActive=true;});
joyZone.addEventListener('touchmove',e=>{e.preventDefault();joyMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
joyZone.addEventListener('touchend',()=>{joyX=0;joyY=0;joyThumb.style.transform='';joyActive=false;});

// Camera rotation on canvas touch (right side)
let camTouchId=null,camTouchLast=null;
document.getElementById('canvas-wrap').addEventListener('touchstart',e=>{
  for(const t of e.touches){if(t.clientX>window.innerWidth*0.35){camTouchId=t.identifier;camTouchLast={x:t.clientX,y:t.clientY};}}
},{passive:true});
document.getElementById('canvas-wrap').addEventListener('touchmove',e=>{
  for(const t of e.touches){if(t.identifier===camTouchId){
    const dx=t.clientX-(camTouchLast?.x||t.clientX);
    cameraAngle+=dx*0.01;camTouchLast={x:t.clientX,y:t.clientY};
  }}
},{passive:true});

// Mouse drag to rotate camera
let mouseDown=false,lastMouseX=0;
renderer.domElement.addEventListener('mousedown',e=>{mouseDown=true;lastMouseX=e.clientX;});
renderer.domElement.addEventListener('mousemove',e=>{if(mouseDown){cameraAngle+=(e.clientX-lastMouseX)*0.006;lastMouseX=e.clientX;}});
renderer.domElement.addEventListener('mouseup',()=>mouseDown=false);

// ═══ MAIN LOOP ═══
function animate(){
  requestAnimationFrame(animate);
  if(!gameActive){renderer.render(scene,camera);return;}
  updateObstacles();
  Object.values(players).forEach(pd=>{
    if(!pd.alive)return;
    if(pd.bot)updateBot(pd);
    updatePhysics(pd);
    checkObstacleHit(pd);
  });
  updateCamera();
  updateNameTags();
  // Lava glow pulse
  lavaLight.intensity=1.8+Math.sin(Date.now()/500)*0.5;
  renderer.render(scene,camera);
}
animate();
</script>
