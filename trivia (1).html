<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Battle — Group Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a14;font-family:'Fredoka',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 10%,rgba(239,71,111,0.07),transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(58,134,255,0.06),transparent 60%);pointer-events:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{0%{transform:scale(0.5);opacity:0}65%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
    @keyframes timerTick{from{width:100%}to{width:0%}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @keyframes correctFlash{0%{background:rgba(6,214,160,0.4)}100%{background:rgba(6,214,160,0.12)}}
    @keyframes wrongFlash{0%{background:rgba(239,71,111,0.4)}100%{background:rgba(239,71,111,0.12)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    .btn{font-family:'Fredoka',sans-serif;border:none;cursor:pointer;transition:all 0.15s;border-radius:14px;font-weight:700}
    .btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
    .btn:active{transform:scale(0.97)}
    .btn:disabled{opacity:0.4;cursor:default;transform:none!important;filter:none!important}
    .inp{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;color:#fff;font-family:'Fredoka',sans-serif;padding:12px 16px;font-size:16px;width:100%;outline:none;transition:border-color 0.2s}
    .inp:focus{border-color:#3A86FF}
    .inp::placeholder{color:rgba(255,255,255,0.28)}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px}
    .opt{width:100%;padding:14px 18px;border-radius:14px;font-family:'Fredoka',sans-serif;font-size:17px;font-weight:600;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all 0.15s}
    .opt:hover:not(:disabled){border-color:rgba(58,134,255,0.5);background:rgba(58,134,255,0.1);transform:translateX(4px)}
    .opt:disabled{cursor:default}
    .opt.correct{border-color:#06D6A0!important;background:rgba(6,214,160,0.15)!important;animation:correctFlash 0.5s}
    .opt.wrong{border-color:#EF476F!important;background:rgba(239,71,111,0.12)!important;animation:wrongFlash 0.5s}
    .opt.show-correct{border-color:#06D6A0!important;background:rgba(6,214,160,0.1)!important}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
  </style>
</head>
<body>
<div style="position:fixed;top:8px;left:8px;z-index:9999"><a href="index.html" style="font-family:Fredoka,sans-serif;font-size:12px;color:#888;text-decoration:none;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:10px">← Group Games</a></div><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const SUPA_URL='https://fphjilkiofiaipuaxptn.supabase.co';
const SUPA_KEY='YOUR_ANON_KEY_HERE';
let db=null;try{db=supabase.createClient(SUPA_URL,SUPA_KEY);}catch(e){}

const G='#06D6A0',B='#3A86FF',Y='#FFD166',R='#EF476F';
const uid=()=>Math.random().toString(36).slice(2,8).toUpperCase();
const uid2=()=>Math.random().toString(36).slice(2,12);
const QTIME=20;

// Demo questions if no Supabase
const DEMO_QS=[
  {id:'d1',type:'mc',question:'What is the capital of Japan?',options:['Seoul','Beijing','Tokyo','Bangkok'],answer:'Tokyo'},
  {id:'d2',type:'tf',question:'The Great Wall of China is visible from space.',answer:'false'},
  {id:'d3',type:'mc',question:'How many planets are in our solar system?',options:['7','8','9','10'],answer:'8'},
  {id:'d4',type:'mc',question:'Which element has the symbol "Au"?',options:['Silver','Gold','Copper','Iron'],answer:'Gold'},
  {id:'d5',type:'tf',question:'Sound travels faster than light.',answer:'false'},
  {id:'d6',type:'mc',question:'What is the largest ocean on Earth?',options:['Atlantic','Indian','Arctic','Pacific'],answer:'Pacific'},
];

function Confetti(){
  const pieces=useRef(Array.from({length:35},(_,i)=>({id:i,x:Math.random()*100,delay:Math.random()*1.2,color:[G,B,Y,R,'#FF6BCB'][i%5],size:6+Math.random()*8,dur:2+Math.random()*2}))).current;
  return <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:999}}>
    {pieces.map(p=><div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:-10,width:p.size,height:p.size,background:p.color,borderRadius:Math.random()>0.5?'50%':'2px',animation:`confetti ${p.dur}s ease-in ${p.delay}s forwards`}}/>)}
  </div>;
}

// ═══ HOME ═══
function Home({onHost,onJoin}){
  const [name,setName]=useState(()=>localStorage.getItem('gg_trivia_name')||'');
  const [code,setCode]=useState('');
  const saveName=n=>{setName(n);localStorage.setItem('gg_trivia_name',n);};
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20,position:'relative',zIndex:1}}>
      <a href="index.html" style={{position:'absolute',top:20,left:20,color:'#666',fontSize:13,textDecoration:'none',fontFamily:'Fredoka'}}>← Group Games</a>
      <div style={{textAlign:'center',marginBottom:32,animation:'fadeIn 0.6s ease-out'}}>
        <div style={{fontSize:52,marginBottom:8}}>⚡</div>
        <div style={{fontSize:38,fontWeight:700,textShadow:`0 0 24px ${R}99`}}>Trivia Battle</div>
        <p style={{color:'#777',fontSize:15,marginTop:6}}>Race to answer · First correct wins · Last one standing</p>
      </div>
      <div className="card" style={{width:'100%',maxWidth:400,padding:24,animation:'slideUp 0.5s ease-out 0.1s both'}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,color:'#888',marginBottom:6}}>Your Name</div>
          <input className="inp" value={name} onChange={e=>saveName(e.target.value)} placeholder="Enter your name..."/>
        </div>
        <button className="btn" onClick={()=>name.trim()&&onHost(name.trim())} disabled={!name.trim()}
          style={{width:'100%',padding:'14px',fontSize:17,background:`linear-gradient(135deg,${R},${Y})`,color:'#fff',marginBottom:12,opacity:name.trim()?1:0.4}}>
          🎯 Host a Game
        </button>
        <div style={{display:'flex',gap:8}}>
          <input className="inp" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="Game code..." maxLength={6} style={{letterSpacing:4,fontSize:20,textAlign:'center'}}/>
          <button className="btn" onClick={()=>code.length>=4&&name.trim()&&onJoin(code,name.trim())} disabled={code.length<4||!name.trim()}
            style={{padding:'12px 18px',fontSize:15,background:`linear-gradient(135deg,${B},${G})`,color:'#fff',flexShrink:0,opacity:code.length>=4&&name.trim()?1:0.4}}>
            Join
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══ HOST SETUP ═══
function HostSetup({playerName,onStart,onCancel}){
  const [sets,setSets]=useState([{id:'demo',title:'Demo Quiz',questions:DEMO_QS,emoji:'⚡'}]);
  const [selectedSet,setSelectedSet]=useState('demo');
  const [qCount,setQCount]=useState(6);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(!db||SUPA_KEY==='YOUR_ANON_KEY_HERE')return;
    setLoading(true);
    db.from('study_sets').select('id,title,emoji,questions').order('created_at',{ascending:false}).limit(20).then(({data})=>{
      if(data?.length)setSets([{id:'demo',title:'Demo Quiz',questions:DEMO_QS,emoji:'⚡'},...data]);
      setLoading(false);
    });
  },[]);

  const chosen=sets.find(s=>s.id===selectedSet)||sets[0];
  const questions=(chosen.questions||[]).slice(0,qCount);

  return(
    <div style={{minHeight:'100vh',position:'relative',zIndex:1,padding:'20px 16px'}}>
      <div style={{maxWidth:480,margin:'0 auto'}}>
        <button onClick={onCancel} style={{background:'none',border:'none',color:'#888',fontSize:13,cursor:'pointer',fontFamily:'Fredoka',marginBottom:16}}>← Back</button>
        <h2 style={{fontSize:24,marginBottom:20}}>Game Setup</h2>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,color:'#888',marginBottom:8}}>Choose Question Set</div>
          <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:240,overflowY:'auto'}}>
            {loading?<div style={{color:'#666',textAlign:'center',padding:16}}>Loading sets...</div>:
            sets.map(s=>(
              <div key={s.id} onClick={()=>setSelectedSet(s.id)} className="card" style={{padding:'12px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:12,
                borderColor:selectedSet===s.id?`${G}55`:'rgba(255,255,255,0.08)',background:selectedSet===s.id?`${G}0a`:'rgba(255,255,255,0.04)'}}>
                <span style={{fontSize:24}}>{s.emoji||'📚'}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:15,color:'#fff'}}>{s.title}</div>
                  <div style={{fontSize:12,color:'#666'}}>{(s.questions||[]).length} questions</div>
                </div>
                {selectedSet===s.id&&<span style={{marginLeft:'auto',color:G}}>✓</span>}
              </div>
            ))}
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,color:'#888',marginBottom:8}}>Questions to Play: <span style={{color:Y}}>{qCount}</span></div>
          <input type="range" min={3} max={Math.min(20,(chosen.questions||[]).length||20)} value={qCount} onChange={e=>setQCount(+e.target.value)}
            style={{width:'100%',accentColor:G}}/>
        </div>

        <button className="btn" onClick={()=>onStart(questions,chosen.title)}
          style={{width:'100%',padding:'15px',fontSize:18,background:`linear-gradient(135deg,${R},${Y})`,color:'#fff',boxShadow:`0 6px 22px ${R}44`}}>
          🚀 Create Room
        </button>
      </div>
    </div>
  );
}

// ═══ LOBBY ═══
function Lobby({roomCode,players,isHost,setTitle,onStart,onLeave}){
  const [copied,setCopied]=useState(false);
  function copy(){navigator.clipboard?.writeText(roomCode);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,position:'relative',zIndex:1}}>
      <div style={{maxWidth:440,width:'100%',animation:'fadeIn 0.5s ease-out'}}>
        <button onClick={onLeave} style={{background:'none',border:'none',color:'#888',fontSize:13,cursor:'pointer',fontFamily:'Fredoka',marginBottom:16}}>✕ Leave</button>
        <div className="card" style={{padding:24,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:4}}>⚡</div>
          <div style={{fontSize:20,fontWeight:700,color:'#fff',marginBottom:4}}>{setTitle}</div>
          <div style={{fontSize:13,color:'#888',marginBottom:16}}>Share this code:</div>
          <div onClick={copy} style={{fontSize:38,fontWeight:700,color:Y,letterSpacing:8,background:`${Y}10`,borderRadius:16,padding:'12px 24px',display:'inline-block',marginBottom:8,border:`1px solid ${Y}33`,cursor:'pointer',userSelect:'all'}}>
            {roomCode}</div>
          <div style={{fontSize:12,color:'#666',marginBottom:20}}>{copied?'Copied!':'Tap to copy'}</div>

          <div style={{marginBottom:20}}>
            <div style={{fontSize:14,color:'#888',marginBottom:10}}>Players ({players.length}):</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
              {players.map(p=>(
                <div key={p.id} style={{padding:'8px 16px',background:'rgba(255,255,255,0.06)',borderRadius:12,fontSize:14,fontWeight:600,color:'#fff',display:'flex',alignItems:'center',gap:6}}>
                  <span>{['🦊','🐸','🐙','🦋','🦁','🐧','🐺','🦄'][players.indexOf(p)%8]}</span>{p.name}{isHost&&p.isHost?<span style={{fontSize:11,color:Y}}> ★</span>:null}
                </div>
              ))}
            </div>
          </div>

          {isHost?(
            players.length>=2?
            <button className="btn" onClick={onStart} style={{padding:'14px 48px',fontSize:18,background:`linear-gradient(135deg,${G},${B})`,color:'#fff',boxShadow:`0 6px 22px ${G}44`}}>Start Battle!</button>:
            <div style={{color:'#888',fontSize:14,animation:'pulse 2s ease-in-out infinite'}}>Waiting for at least 2 players...</div>
          ):(
            <div style={{color:'#888',fontSize:14,animation:'pulse 2s ease-in-out infinite'}}>Waiting for host to start...</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══ GAME ═══
function Game({questions,players,myId,isHost,channel,onGameEnd}){
  const [qi,setQi]=useState(0);
  const [phase,setPhase]=useState('countdown'); // countdown|question|reveal|end
  const [timeLeft,setTimeLeft]=useState(3);
  const [chosen,setChosen]=useState(null);
  const [scores,setScores]=useState(()=>Object.fromEntries(players.map(p=>[p.id,0])));
  const [answeredBy,setAnsweredBy]=useState({}); // {playerId: answer}
  const [timerKey,setTimerKey]=useState(0);
  const timerRef=useRef(null);
  const phaseRef=useRef(phase);phaseRef.current=phase;
  const qiRef=useRef(qi);qiRef.current=qi;

  const q=questions[qi];
  const opts=q?.type==='tf'?['true','false']:q?.options||[];

  useEffect(()=>{
    if(!channel)return;
    const sub=channel.on('broadcast',{event:'answer'},(msg)=>{
      const {playerId,answer,time}=msg.payload;
      setAnsweredBy(prev=>{
        if(prev[playerId])return prev;
        return {...prev,[playerId]:{answer,time}};
      });
    }).on('broadcast',{event:'next'},(msg)=>{
      const {qi:newQi}=msg.payload;
      advanceTo(newQi);
    }).on('broadcast',{event:'end'},()=>onGameEnd(scores));
    return ()=>{};
  },[channel]);

  useEffect(()=>{
    clearInterval(timerRef.current);
    if(phase==='countdown'){
      let t=3;setTimeLeft(t);
      timerRef.current=setInterval(()=>{t--;setTimeLeft(t);if(t<=0){clearInterval(timerRef.current);setPhase('question');setTimerKey(k=>k+1);}},1000);
    } else if(phase==='question'){
      let t=QTIME;setTimeLeft(t);
      timerRef.current=setInterval(()=>{t--;setTimeLeft(t);if(t<=0){clearInterval(timerRef.current);setPhase('reveal');if(isHost)setTimeout(()=>hostNext(),2500);}},1000);
    }
    return ()=>clearInterval(timerRef.current);
  },[phase,qi]);

  // Score calculation when answers change
  useEffect(()=>{
    if(phase!=='question')return;
    const correct=Object.entries(answeredBy).filter(([,a])=>a.answer===q?.answer);
    if(correct.length>0){
      clearInterval(timerRef.current);
      // Award points by speed
      const sorted=[...correct].sort((a,b)=>a[1].time-b[1].time);
      setScores(prev=>{
        const next={...prev};
        sorted.forEach(([id],i)=>next[id]=(next[id]||0)+Math.max(100-i*20,10));
        return next;
      });
      setPhase('reveal');
      if(isHost)setTimeout(()=>hostNext(),2800);
    }
  },[answeredBy]);

  function hostNext(){
    const nextQi=qiRef.current+1;
    if(nextQi>=questions.length){
      channel?.send({type:'broadcast',event:'end',payload:{}});
      onGameEnd(scores);
    } else {
      channel?.send({type:'broadcast',event:'next',payload:{qi:nextQi}});
      advanceTo(nextQi);
    }
  }

  function advanceTo(newQi){
    setQi(newQi);setChosen(null);setAnsweredBy({});setPhase('question');setTimerKey(k=>k+1);
  }

  function handleAnswer(ans){
    if(chosen||phase!=='question')return;
    setChosen(ans);
    channel?.send({type:'broadcast',event:'answer',payload:{playerId:myId,answer:ans,time:Date.now()}});
    setAnsweredBy(prev=>({...prev,[myId]:{answer:ans,time:Date.now()}}));
  }

  const myScore=scores[myId]||0;
  const timerPct=timeLeft/QTIME;
  const timerColor=timerPct>0.5?G:timerPct>0.25?Y:R;
  const answered=Object.keys(answeredBy).length;

  if(phase==='countdown') return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',position:'relative',zIndex:1}}>
      <div style={{fontSize:100,fontWeight:700,color:Y,animation:'popIn 0.3s ease-out',textShadow:`0 0 40px ${Y}88`}}>{timeLeft||'GO!'}</div>
      <div style={{fontSize:18,color:'#aaa',marginTop:8}}>Get ready!</div>
    </div>
  );

  if(phase==='end')return null;

  return(
    <div style={{minHeight:'100vh',position:'relative',zIndex:1,padding:'16px 16px 40px'}}>
      <div style={{maxWidth:560,margin:'0 auto'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontSize:14,color:'#888'}}>{qi+1} / {questions.length}</div>
          <div style={{fontSize:14,fontWeight:700,color:timerColor,animation:timeLeft<=5?'pulse 0.5s infinite':null}}>⏱ {timeLeft}s</div>
          <div style={{fontSize:14,color:Y}}>🏅 {myScore}</div>
        </div>

        {/* Timer bar */}
        <div style={{background:'rgba(255,255,255,0.07)',borderRadius:99,height:5,overflow:'hidden',marginBottom:16}}>
          <div key={timerKey} style={{height:'100%',borderRadius:99,background:`linear-gradient(90deg,${timerColor},${timerColor}88)`,
            animation:phase==='question'?`timerTick ${QTIME}s linear forwards`:'none',width:phase==='question'?undefined:'0%'}}/>
        </div>

        {/* Question */}
        <div className="card" key={q.id} style={{padding:24,marginBottom:16,animation:'fadeIn 0.35s ease-out',minHeight:100}}>
          <div style={{fontSize:19,fontWeight:600,color:'#fff',lineHeight:1.5}}>{q.question}</div>
          <div style={{marginTop:10,fontSize:13,color:'#666'}}>
            {answered} / {players.length} answered
            {answeredBy[myId]&&<span style={{color:G,marginLeft:8}}>✓ Your answer locked in</span>}
          </div>
        </div>

        {/* Options */}
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
          {opts.map((opt,i)=>{
            const isChosen=chosen===opt;
            const isCorrect=opt===q.answer;
            let cls='opt';
            if(phase==='reveal'){if(isCorrect)cls+=' show-correct';if(isChosen&&!isCorrect)cls+=' wrong';if(isChosen&&isCorrect)cls+=' correct';}
            const labels=['A','B','C','D'];
            return(
              <button key={i} className={cls} disabled={!!chosen||phase==='reveal'} onClick={()=>handleAnswer(opt)}>
                <span style={{width:30,height:30,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0,
                  background:phase==='reveal'?(isCorrect?G:isChosen?R:'rgba(255,255,255,0.08)'):'rgba(255,255,255,0.1)',
                  color:phase==='reveal'?(isCorrect?'#0a0a14':isChosen?'#fff':'#555'):'#aaa'}}>
                  {q.type==='tf'?(opt==='true'?'✓':'✗'):labels[i]}
                </span>
                {q.type==='tf'?opt.charAt(0).toUpperCase()+opt.slice(1):opt}
                {phase==='reveal'&&isCorrect&&<span style={{marginLeft:'auto'}}>✓</span>}
              </button>
            );
          })}
        </div>

        {/* Who answered */}
        {phase==='reveal'&&(
          <div className="card" style={{padding:16,animation:'slideUp 0.35s ease-out'}}>
            <div style={{fontSize:13,color:'#888',marginBottom:10}}>Results</div>
            {players.sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0)).map((p,i)=>(
              <div key={p.id} style={{display:'flex',gap:10,alignItems:'center',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                <span style={{fontSize:13,color:'#666',minWidth:20}}>{i+1}</span>
                <span style={{flex:1,fontWeight:p.id===myId?700:400,color:p.id===myId?Y:'#ddd'}}>{p.name}</span>
                {answeredBy[p.id]&&<span style={{fontSize:14,color:answeredBy[p.id].answer===q.answer?G:R}}>
                  {answeredBy[p.id].answer===q.answer?'+'+Math.max(100-(Object.keys(answeredBy).indexOf(p.id)*20),10):'✗'}</span>}
                <span style={{color:Y,fontWeight:700}}>{scores[p.id]||0}</span>
              </div>
            ))}
            {!isHost&&<div style={{fontSize:13,color:'#666',textAlign:'center',marginTop:10,animation:'pulse 1.5s infinite'}}>Waiting for host...</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══ END SCREEN ═══
function EndScreen({players,scores,myId,onHome}){
  const sorted=[...players].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  const winner=sorted[0];
  const iWon=winner?.id===myId;
  const EMOJIS=['🥇','🥈','🥉'];
  return(
    <div style={{minHeight:'100vh',position:'relative',zIndex:1,padding:'24px 16px'}}>
      {iWon&&<Confetti/>}
      <div style={{maxWidth:480,margin:'0 auto',textAlign:'center'}}>
        <div style={{fontSize:60,marginBottom:8}}>🏆</div>
        <div style={{fontSize:30,fontWeight:700,marginBottom:4}}>{iWon?'You Won! 🎉':winner?.name+' wins!'}</div>
        <div style={{fontSize:15,color:'#888',marginBottom:28}}>{iWon?'Incredible trivia skills!':'Better luck next time!'}</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
          {sorted.map((p,i)=>(
            <div key={p.id} className="card" style={{padding:'14px 18px',display:'flex',alignItems:'center',gap:12,
              background:i===0?`${Y}10`:p.id===myId?`${B}08`:'rgba(255,255,255,0.04)',
              borderColor:i===0?`${Y}44`:p.id===myId?`${B}33`:'rgba(255,255,255,0.08)',
              animation:`fadeIn 0.4s ease-out ${i*0.1}s both`}}>
              <span style={{fontSize:22}}>{EMOJIS[i]||`#${i+1}`}</span>
              <span style={{flex:1,fontWeight:p.id===myId?700:500,fontSize:17,color:p.id===myId?Y:'#fff'}}>{p.name}{p.id===myId?' (you)':''}</span>
              <span style={{fontSize:20,fontWeight:700,color:Y}}>{scores[p.id]||0}</span>
            </div>
          ))}
        </div>
        <button className="btn" onClick={onHome} style={{padding:'14px 40px',fontSize:17,background:`linear-gradient(135deg,${G},${B})`,color:'#fff'}}>← Home</button>
      </div>
    </div>
  );
}

// ═══ ROOT ═══
function App(){
  const [screen,setScreen]=useState('home'); // home|setup|lobby|game|end
  const [playerName,setPlayerName]=useState('');
  const [roomCode,setRoomCode]=useState('');
  const [players,setPlayers]=useState([]);
  const [isHost,setIsHost]=useState(false);
  const [myId]=useState(uid2);
  const [questions,setQuestions]=useState([]);
  const [setTitle,setSetTitle]=useState('');
  const [channel,setChannel]=useState(null);
  const [finalScores,setFinalScores]=useState({});

  function joinChannel(code,name,host,qs,title){
    if(!db||SUPA_KEY==='YOUR_ANON_KEY_HERE'){
      // Local/demo mode - just go to game with bots
      const me={id:myId,name,isHost:host};
      const bot={id:'bot1',name:'RoboPlayer',isHost:false};
      setPlayers([me,bot]);
      if(qs&&qs.length)setQuestions(qs);
      setChannel(null);
      setScreen('game');
      return;
    }
    const ch=db.channel(`trivia-${code}`,{config:{broadcast:{self:true}}});
    ch.on('broadcast',{event:'players'},(msg)=>{setPlayers(msg.payload.players||[]);})
      .on('broadcast',{event:'start'},(msg)=>{
        setQuestions(msg.payload.questions||[]);
        setSetTitle(msg.payload.title||'');
        setScreen('game');
      })
      .subscribe(async()=>{
        setChannel(ch);
        const me={id:myId,name,isHost:host};
        // Announce presence
        await ch.send({type:'broadcast',event:'join',payload:{player:me}});
        if(host){
          const initPlayers=[me];
          setPlayers(initPlayers);
          await ch.send({type:'broadcast',event:'players',payload:{players:initPlayers}});
        }
      });
    ch.on('broadcast',{event:'join'},(msg)=>{
      setPlayers(prev=>{
        if(prev.find(p=>p.id===msg.payload.player.id))return prev;
        const next=[...prev,msg.payload.player];
        if(isHost)ch.send({type:'broadcast',event:'players',payload:{players:next}});
        return next;
      });
    });
  }

  function handleHost(name){
    setPlayerName(name);setIsHost(true);
    setScreen('setup');
  }

  function handleJoin(code,name){
    setPlayerName(name);setRoomCode(code);setIsHost(false);
    const me={id:myId,name,isHost:false};
    setPlayers([me]);
    joinChannel(code,name,false);
    setScreen('lobby');
  }

  function handleSetupDone(qs,title){
    const code=uid();setRoomCode(code);setQuestions(qs);setSetTitle(title);
    const me={id:myId,name:playerName,isHost:true};
    setPlayers([me]);
    joinChannel(code,playerName,true,qs,title);
    setScreen('lobby');
  }

  function startGame(){
    if(channel){
      channel.send({type:'broadcast',event:'start',payload:{questions,title:setTitle}});
    }
    setScreen('game');
  }

  function handleGameEnd(scores){setFinalScores(scores);setScreen('end');}

  function reset(){setScreen('home');setPlayers([]);setChannel(null);setRoomCode('');setQuestions([]);}

  if(screen==='home') return <Home onHost={handleHost} onJoin={handleJoin}/>;
  if(screen==='setup') return <HostSetup playerName={playerName} onStart={handleSetupDone} onCancel={()=>setScreen('home')}/>;
  if(screen==='lobby') return <Lobby roomCode={roomCode} players={players} isHost={isHost} setTitle={setTitle} onStart={startGame} onLeave={reset}/>;
  if(screen==='game') return <Game questions={questions} players={players} myId={myId} isHost={isHost} channel={channel} onGameEnd={handleGameEnd}/>;
  if(screen==='end') return <EndScreen players={players} scores={finalScores} myId={myId} onHome={reset}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
