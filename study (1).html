<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study — Group Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a14;font-family:'Fredoka',sans-serif;overflow-x:hidden;color:#fff;min-height:100vh}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{0%{transform:scale(0.6);opacity:0}65%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(800deg);opacity:0}}
    @keyframes timerDrain{from{width:100%}to{width:0%}}
    @keyframes correctPop{0%{background:rgba(6,214,160,0.35)}100%{background:rgba(6,214,160,0.12)}}
    @keyframes wrongPop{0%{background:rgba(239,71,111,0.35)}100%{background:rgba(239,71,111,0.12)}}
    @keyframes shimmer{0%{background-position:-400% 0}100%{background-position:400% 0}}

    .btn{font-family:'Fredoka',sans-serif;border:none;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s}
    .btn:hover{transform:translateY(-2px)}
    .btn:active{transform:translateY(0) scale(0.98)}
    .btn:disabled{opacity:0.45;cursor:default;transform:none!important}

    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px}

    .inp{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;
      color:#fff;font-family:'Fredoka',sans-serif;padding:12px 16px;font-size:16px;width:100%;
      transition:border-color 0.2s,background 0.2s;outline:none}
    .inp:focus{border-color:#06D6A0;background:rgba(6,214,160,0.06)}
    .inp::placeholder{color:rgba(255,255,255,0.28)}
    textarea.inp{resize:vertical;min-height:80px;line-height:1.5}

    .set-card{cursor:pointer;transition:all 0.22s}
    .set-card:hover{transform:translateY(-4px);border-color:rgba(6,214,160,0.35)!important;
      box-shadow:0 8px 32px rgba(6,214,160,0.12)!important}

    .opt-btn{width:100%;padding:14px 18px;border-radius:14px;font-family:'Fredoka',sans-serif;
      font-size:17px;font-weight:600;border:2px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;
      text-align:left;transition:all 0.18s;display:flex;align-items:center;gap:10px}
    .opt-btn:hover:not(:disabled){border-color:rgba(58,134,255,0.5);background:rgba(58,134,255,0.1);transform:translateX(4px)}
    .opt-btn:disabled{cursor:default}
    .opt-btn.correct{border-color:#06D6A0!important;background:rgba(6,214,160,0.15)!important;animation:correctPop 0.5s ease-out}
    .opt-btn.wrong{border-color:#EF476F!important;background:rgba(239,71,111,0.15)!important;animation:wrongPop 0.5s ease-out}

    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

    .step-dot{width:9px;height:9px;border-radius:50%;transition:all 0.3s}

    /* Neon grid bg */
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;
      background:radial-gradient(ellipse at 20% 20%,rgba(6,214,160,0.06) 0%,transparent 60%),
        radial-gradient(ellipse at 80% 80%,rgba(58,134,255,0.05) 0%,transparent 60%);
      pointer-events:none;z-index:0}
  </style>
</head>
<body>
<div style="position:fixed;top:8px;left:8px;z-index:9999"><a href="index.html" style="font-family:Fredoka,sans-serif;font-size:12px;color:#888;text-decoration:none;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:10px">← Group Games</a></div><div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════
//  ⚠️  CONFIGURATION  — fill in your anon key
// ═══════════════════════════════════════════════
const SUPABASE_URL  = 'https://fphjilkiofiaipuaxptn.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_KEY_HERE'; // ← paste from Supabase → Settings → API

/*
═══ SUPABASE SQL (run once in SQL Editor) ═══════════

create table if not exists study_sets (
  id          uuid primary key default gen_random_uuid(),
  title       text not null,
  description text default '',
  creator     text not null,
  questions   jsonb not null default '[]'::jsonb,
  play_count  int  default 0,
  created_at  timestamptz default now()
);

alter table study_sets enable row level security;

create policy "Public read"    on study_sets for select using (true);
create policy "Anyone insert"  on study_sets for insert with check (true);
create policy "Anyone update"  on study_sets for update using (true);

═══════════════════════════════════════════════════
*/

let db = null;
try { db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch(e) {}

// ── colours ──────────────────────────────────────
const G = '#06D6A0', B = '#3A86FF', Y = '#FFD166', R = '#EF476F';
const QTYPE = {
  mc:    { label:'Multiple Choice', icon:'🔘', color:B },
  tf:    { label:'True / False',    icon:'⚖️',  color:Y },
  type:  { label:'Type Answer',     icon:'⌨️',  color:G },
  image: { label:'Image Based',     icon:'🖼️',  color:R },
};
const EMOJIS = ['📚','🧠','🎯','⚡','🔥','🌊','🎮','💡','🏆','🦊','🎲','🌟'];
const uid = () => Math.random().toString(36).slice(2,9);
const DEMO_SETS = [
  { id:'demo1', title:'Geography Basics', description:'Test your world knowledge!', creator:'System',
    play_count:42, created_at: new Date().toISOString(), emoji:'🌍',
    questions:[
      {id:'q1',type:'mc',   question:'What is the capital of France?',  options:['London','Berlin','Paris','Madrid'],      answer:'Paris'},
      {id:'q2',type:'tf',   question:'Australia is the largest continent.',                                                 answer:'false'},
      {id:'q3',type:'type', question:'Name the longest river in the world.',                                               answer:'nile'},
      {id:'q4',type:'mc',   question:'Which country has the most people?', options:['India','USA','China','Brazil'],       answer:'India'},
    ]},
  { id:'demo2', title:'Science Fun', description:'Quick science questions for everyone.', creator:'System',
    play_count:18, created_at: new Date().toISOString(), emoji:'🔬',
    questions:[
      {id:'q1',type:'tf',   question:'The sun is a planet.',                                                               answer:'false'},
      {id:'q2',type:'type', question:'What gas do plants absorb from the air?',                                            answer:'co2'},
      {id:'q3',type:'mc',   question:'How many bones in the adult human body?', options:['186','206','236','256'],         answer:'206'},
    ]},
];

// ── helpers ───────────────────────────────────────
function ago(ts) {
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60)   return 'just now';
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400)return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}
function normalise(s) { return s.trim().toLowerCase().replace(/[^a-z0-9]/g,''); }

// ── tiny components ───────────────────────────────
const Back = ({onClick,label='← Back'}) => (
  <button onClick={onClick} style={{background:'none',border:'none',color:'#888',fontSize:14,cursor:'pointer',
    fontFamily:'Fredoka',transition:'color 0.2s'}}
    onMouseEnter={e=>e.target.style.color='#fff'} onMouseLeave={e=>e.target.style.color='#888'}>{label}</button>
);

const Badge = ({type}) => {
  const q = QTYPE[type]||QTYPE.mc;
  return <span style={{fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:20,
    background:q.color+'22',color:q.color,border:`1px solid ${q.color}44`}}>{q.icon} {q.label}</span>;
};

const Spinner = () => (
  <div style={{display:'flex',justifyContent:'center',padding:48}}>
    <div style={{width:36,height:36,borderRadius:'50%',border:`3px solid rgba(255,255,255,0.1)`,
      borderTopColor:G,animation:'spin 0.8s linear infinite'}} />
  </div>
);

// ── confetti ─────────────────────────────────────
function Confetti() {
  const pieces = useRef(Array.from({length:40},(_,i)=>({
    id:i, x:Math.random()*100, delay:Math.random()*1.5,
    color:[G,B,Y,R,'#FF6BCB','#FFE66D'][i%6],
    size:5+Math.random()*9, dur:2+Math.random()*2.5,
    shape:Math.random()>0.5?'circle':'2px'
  }))).current;
  return (
    <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:999}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:-20,
          width:p.size,height:p.size,background:p.color,borderRadius:p.shape,
          animation:`confettiFall ${p.dur}s ease-in ${p.delay}s forwards`}} />
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════
//  SET CARD
// ═══════════════════════════════════════════════
function SetCard({set,onPlay,index}) {
  return (
    <div className="card set-card" onClick={()=>onPlay(set)}
      style={{padding:18,display:'flex',gap:16,alignItems:'center',
        animation:`fadeIn 0.45s ease-out ${index*0.06}s both`}}>
      <div style={{fontSize:36,minWidth:52,textAlign:'center',
        animation:`float 3s ease-in-out ${index*0.3}s infinite`}}>
        {set.emoji||EMOJIS[set.title.length % EMOJIS.length]}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:18,fontWeight:700,color:'#fff',marginBottom:2,
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{set.title}</div>
        {set.description&&<div style={{fontSize:13,color:'#777',marginBottom:6,
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{set.description}</div>}
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'#666'}}>by <span style={{color:'#aaa'}}>{set.creator}</span></span>
          <span style={{fontSize:12,color:'#555'}}>·</span>
          <span style={{fontSize:12,color:'#666'}}>{set.questions?.length||0} questions</span>
          <span style={{fontSize:12,color:'#555'}}>·</span>
          <span style={{fontSize:12,color:'#666'}}>{set.play_count||0} plays</span>
        </div>
      </div>
      <button className="btn" onClick={e=>{e.stopPropagation();onPlay(set);}} style={{
        padding:'10px 18px',borderRadius:12,fontSize:15,fontWeight:700,flexShrink:0,
        background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
        boxShadow:`0 4px 16px ${G}33`}}>Play</button>
    </div>
  );
}

// ═══════════════════════════════════════════════
//  HOME SCREEN
// ═══════════════════════════════════════════════
function Home({sets,loading,username,onUsername,onCreate,onPlay}) {
  const [search,setSearch]=useState('');
  const filtered = sets.filter(s=>
    s.title.toLowerCase().includes(search.toLowerCase())||
    s.creator.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={{minHeight:'100vh',position:'relative',zIndex:1}}>
      {/* Header */}
      <div style={{background:'linear-gradient(180deg,rgba(6,214,160,0.1) 0%,transparent 100%)',
        borderBottom:'1px solid rgba(6,214,160,0.1)',padding:'28px 20px 24px'}}>
        <div style={{maxWidth:600,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
            <a href="index.html" style={{color:'#666',fontSize:13,textDecoration:'none',fontFamily:'Fredoka',
              transition:'color 0.2s'}} onMouseEnter={e=>e.target.style.color='#fff'}
              onMouseLeave={e=>e.target.style.color='#666'}>← Group Games</a>
            {username&&<div style={{fontSize:13,color:'#888',background:'rgba(255,255,255,0.06)',
              padding:'6px 14px',borderRadius:20,border:'1px solid rgba(255,255,255,0.1)'}}>👤 {username}</div>}
          </div>

          <div style={{textAlign:'center',animation:'fadeIn 0.6s ease-out'}}>
            <div style={{fontSize:52,marginBottom:6,animation:'float 4s ease-in-out infinite'}}>📚</div>
            <div style={{fontSize:38,fontWeight:700,color:'#fff',
              textShadow:`0 0 24px ${G}99,0 0 48px ${G}44`}}>Study</div>
            <p style={{fontSize:15,color:'#777',marginTop:8}}>Create question sets · Challenge friends · Track scores</p>
          </div>

          {!username&&(
            <div style={{marginTop:22,animation:'slideUp 0.5s ease-out 0.2s both'}}>
              <p style={{textAlign:'center',fontSize:13,color:'#888',marginBottom:10}}>Enter your name to create sets</p>
              <div style={{display:'flex',gap:8,maxWidth:340,margin:'0 auto'}}>
                <input className="inp" placeholder="Your name..." id="nameInp"
                  onKeyDown={e=>{if(e.key==='Enter')onUsername(e.target.value.trim())}} />
                <button className="btn" onClick={()=>{
                  const v=document.getElementById('nameInp').value.trim();
                  if(v) onUsername(v);
                }} style={{padding:'12px 18px',borderRadius:12,fontSize:15,fontWeight:700,
                  background:G,color:'#0a0a14',flexShrink:0}}>Go</button>
              </div>
            </div>
          )}

          <div style={{display:'flex',gap:10,marginTop:22,justifyContent:'center',
            animation:'slideUp 0.5s ease-out 0.3s both'}}>
            <button className="btn" onClick={onCreate} style={{
              padding:'13px 28px',borderRadius:14,fontSize:17,fontWeight:700,
              background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
              boxShadow:`0 6px 22px ${G}44`}}>+ Create Set</button>
          </div>
        </div>
      </div>

      {/* Browse */}
      <div style={{maxWidth:600,margin:'24px auto',padding:'0 16px'}}>
        <input className="inp" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 Search sets or creators..." style={{marginBottom:16}} />

        {loading ? <Spinner /> : filtered.length===0 ? (
          <div style={{textAlign:'center',padding:60}}>
            <div style={{fontSize:40,marginBottom:10}}>🎓</div>
            <div style={{color:'#666',fontSize:15}}>No sets found. Be the first to create one!</div>
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {filtered.map((s,i)=><SetCard key={s.id} set={s} onPlay={onPlay} index={i} />)}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
//  CREATE SCREEN — multi-step wizard
// ═══════════════════════════════════════════════
function blankQ(type='mc') {
  return {id:uid(),type,question:'',options:['','','',''],answer:'',imageUrl:''};
}

function QuestionEditor({q,index,onChange,onDelete}) {
  const cfg = QTYPE[q.type];
  return (
    <div className="card" style={{padding:18,marginBottom:12,animation:'fadeIn 0.35s ease-out',
      borderColor:`${cfg.color}33`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{fontSize:14,fontWeight:600,color:'#aaa'}}>Q{index+1}</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {Object.keys(QTYPE).map(t=>(
            <button key={t} className="btn" onClick={()=>onChange({...blankQ(t),id:q.id,question:q.question})}
              style={{padding:'4px 10px',borderRadius:8,fontSize:12,fontWeight:600,
                background:q.type===t?QTYPE[t].color+'33':'rgba(255,255,255,0.06)',
                color:q.type===t?QTYPE[t].color:'#888',
                border:`1px solid ${q.type===t?QTYPE[t].color+'55':'transparent'}`}}>
              {QTYPE[t].icon}
            </button>
          ))}
          <button className="btn" onClick={onDelete}
            style={{padding:'4px 10px',borderRadius:8,fontSize:13,
              background:'rgba(239,71,111,0.12)',color:'#EF476F',border:'none'}}>✕</button>
        </div>
      </div>

      <Badge type={q.type} />
      <div style={{marginTop:12}}>
        <textarea className="inp" placeholder="Question text..." value={q.question}
          onChange={e=>onChange({...q,question:e.target.value})} style={{minHeight:64,marginBottom:12}} />

        {q.type==='image'&&(
          <input className="inp" placeholder="Image URL (https://...)" value={q.imageUrl}
            onChange={e=>onChange({...q,imageUrl:e.target.value})} style={{marginBottom:12}} />
        )}

        {(q.type==='mc'||q.type==='image')&&(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:13,color:'#888',marginBottom:4}}>Options — click ✓ to mark correct</div>
            {q.options.map((opt,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'center'}}>
                <button className="btn" onClick={()=>onChange({...q,answer:opt})}
                  style={{width:32,height:32,borderRadius:8,fontSize:14,flexShrink:0,
                    background:q.answer===opt&&opt?`${G}33`:'rgba(255,255,255,0.06)',
                    color:q.answer===opt&&opt?G:'#666',
                    border:`1.5px solid ${q.answer===opt&&opt?G:'rgba(255,255,255,0.12)'}`}}>✓</button>
                <input className="inp" placeholder={`Option ${i+1}`} value={opt}
                  onChange={e=>{
                    const opts=[...q.options]; opts[i]=e.target.value;
                    const newAns=q.answer===q.options[i]?e.target.value:q.answer;
                    onChange({...q,options:opts,answer:newAns});
                  }} />
              </div>
            ))}
          </div>
        )}

        {q.type==='tf'&&(
          <div style={{display:'flex',gap:10}}>
            {['true','false'].map(v=>(
              <button key={v} className="btn" onClick={()=>onChange({...q,answer:v})}
                style={{flex:1,padding:'12px 0',borderRadius:12,fontSize:17,fontWeight:700,
                  background:q.answer===v?(v==='true'?`${G}33`:`${R}33`):'rgba(255,255,255,0.06)',
                  color:q.answer===v?(v==='true'?G:R):'#888',
                  border:`2px solid ${q.answer===v?(v==='true'?G:R):'rgba(255,255,255,0.1)'}`}}>
                {v==='true'?'✓ True':'✗ False'}
              </button>
            ))}
          </div>
        )}

        {q.type==='type'&&(
          <input className="inp" placeholder="Correct answer (players must type this exactly)" value={q.answer}
            onChange={e=>onChange({...q,answer:e.target.value})} />
        )}
      </div>
    </div>
  );
}

function Create({username,onBack,onPublish}) {
  const [step,setStep]=useState(0); // 0=info, 1=questions, 2=preview
  const [title,setTitle]=useState('');
  const [desc,setDesc]=useState('');
  const [emoji,setEmoji]=useState('📚');
  const [questions,setQuestions]=useState([blankQ('mc')]);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState('');

  const addQ=(type)=>setQuestions(qs=>[...qs,blankQ(type)]);
  const updateQ=(i,q)=>setQuestions(qs=>qs.map((x,j)=>j===i?q:x));
  const deleteQ=(i)=>setQuestions(qs=>qs.filter((_,j)=>j!==i));

  const canNext0 = title.trim().length>=2;
  const canNext1 = questions.length>=1 && questions.every(q=>q.question.trim()&&q.answer);

  async function publish() {
    setSaving(true); setError('');
    const set = { title:title.trim(), description:desc.trim(), creator:username||'Anonymous',
      questions, emoji, play_count:0 };
    if (db && SUPABASE_ANON!=='YOUR_ANON_KEY_HERE') {
      const {data,error:err} = await db.from('study_sets').insert([set]).select().single();
      if (err) { setError(err.message); setSaving(false); return; }
      onPublish({...set,...data});
    } else {
      // demo mode — just return with local id
      onPublish({...set, id:'local_'+uid(), created_at:new Date().toISOString()});
    }
    setSaving(false);
  }

  const steps=['Info','Questions','Publish'];

  return (
    <div style={{minHeight:'100vh',position:'relative',zIndex:1}}>
      <div style={{maxWidth:600,margin:'0 auto',padding:'24px 16px 60px'}}>
        <Back onClick={onBack} />

        {/* stepper */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,margin:'20px 0 28px'}}>
          {steps.map((s,i)=>(
            <React.Fragment key={i}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:30,height:30,borderRadius:'50%',display:'flex',alignItems:'center',
                  justifyContent:'center',fontSize:13,fontWeight:700,transition:'all 0.3s',
                  background:i<=step?G:'rgba(255,255,255,0.08)',
                  color:i<=step?'#0a0a14':'#666',
                  boxShadow:i===step?`0 0 16px ${G}66`:null}}>{i+1}</div>
                <span style={{fontSize:12,color:i===step?G:'#666',transition:'color 0.3s'}}>{s}</span>
              </div>
              {i<steps.length-1&&<div style={{width:48,height:2,borderRadius:2,marginBottom:14,
                background:i<step?G:'rgba(255,255,255,0.08)',transition:'background 0.3s'}} />}
            </React.Fragment>
          ))}
        </div>

        {/* Step 0: Info */}
        {step===0&&(
          <div style={{animation:'fadeIn 0.4s ease-out'}}>
            <h2 style={{fontSize:24,marginBottom:20,color:'#fff'}}>Set Details</h2>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,color:'#888',marginBottom:6}}>Emoji</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:4}}>
                {EMOJIS.map(e=>(
                  <button key={e} className="btn" onClick={()=>setEmoji(e)}
                    style={{fontSize:26,background:emoji===e?'rgba(6,214,160,0.15)':'rgba(255,255,255,0.05)',
                      borderRadius:10,padding:'4px 8px',border:`2px solid ${emoji===e?G:'transparent'}`}}>{e}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,color:'#888',marginBottom:6}}>Title *</div>
              <input className="inp" placeholder="e.g. World Capitals" value={title}
                onChange={e=>setTitle(e.target.value)} />
            </div>
            <div style={{marginBottom:24}}>
              <div style={{fontSize:13,color:'#888',marginBottom:6}}>Description</div>
              <textarea className="inp" placeholder="Optional — describe what this set covers" value={desc}
                onChange={e=>setDesc(e.target.value)} />
            </div>
            <button className="btn" onClick={()=>setStep(1)} disabled={!canNext0}
              style={{width:'100%',padding:'15px 0',borderRadius:14,fontSize:18,fontWeight:700,
                background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
                boxShadow:`0 6px 22px ${G}44`,opacity:canNext0?1:0.4}}>
              Next: Add Questions →
            </button>
          </div>
        )}

        {/* Step 1: Questions */}
        {step===1&&(
          <div style={{animation:'fadeIn 0.4s ease-out'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h2 style={{fontSize:24,color:'#fff'}}>{questions.length} Question{questions.length!==1?'s':''}</h2>
              <Back onClick={()=>setStep(0)} label='← Info' />
            </div>

            {questions.map((q,i)=>(
              <QuestionEditor key={q.id} q={q} index={i}
                onChange={nq=>updateQ(i,nq)} onDelete={()=>deleteQ(i)} />
            ))}

            {/* Add question type picker */}
            <div className="card" style={{padding:16,marginBottom:20}}>
              <div style={{fontSize:13,color:'#888',marginBottom:12,textAlign:'center'}}>Add Question</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {Object.entries(QTYPE).map(([t,cfg])=>(
                  <button key={t} className="btn" onClick={()=>addQ(t)}
                    style={{padding:'12px 10px',borderRadius:12,fontSize:14,fontWeight:600,
                      background:`${cfg.color}15`,color:cfg.color,
                      border:`1.5px solid ${cfg.color}33`,
                      display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                    <span style={{fontSize:18}}>{cfg.icon}</span>{cfg.label}
                  </button>
                ))}
              </div>
            </div>

            <button className="btn" onClick={()=>setStep(2)} disabled={!canNext1}
              style={{width:'100%',padding:'15px 0',borderRadius:14,fontSize:18,fontWeight:700,
                background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
                boxShadow:`0 6px 22px ${G}44`,opacity:canNext1?1:0.4}}>
              Preview & Publish →
            </button>
            {!canNext1&&<p style={{textAlign:'center',fontSize:13,color:'#666',marginTop:10}}>
              Fill in all questions and mark correct answers first</p>}
          </div>
        )}

        {/* Step 2: Preview */}
        {step===2&&(
          <div style={{animation:'fadeIn 0.4s ease-out'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h2 style={{fontSize:24,color:'#fff'}}>Preview</h2>
              <Back onClick={()=>setStep(1)} label='← Edit' />
            </div>

            <div className="card" style={{padding:20,marginBottom:16,textAlign:'center',
              background:`linear-gradient(135deg,${G}12,${B}08)`,borderColor:`${G}33`}}>
              <div style={{fontSize:52,marginBottom:8}}>{emoji}</div>
              <div style={{fontSize:24,fontWeight:700,color:'#fff',marginBottom:4}}>{title}</div>
              {desc&&<div style={{fontSize:14,color:'#888',marginBottom:8}}>{desc}</div>}
              <div style={{display:'flex',gap:16,justifyContent:'center',fontSize:14,color:'#888'}}>
                <span>📝 {questions.length} questions</span>
                <span>👤 {username||'Anonymous'}</span>
              </div>
            </div>

            <div style={{marginBottom:20}}>
              {questions.map((q,i)=>(
                <div key={q.id} className="card" style={{padding:14,marginBottom:8,display:'flex',
                  gap:12,alignItems:'flex-start'}}>
                  <span style={{fontSize:12,color:'#666',minWidth:24,paddingTop:2}}>Q{i+1}</span>
                  <div style={{flex:1}}>
                    <Badge type={q.type} />
                    <div style={{fontSize:15,color:'#ddd',marginTop:6}}>{q.question}</div>
                    <div style={{fontSize:13,color:G,marginTop:4}}>✓ {q.answer}</div>
                  </div>
                </div>
              ))}
            </div>

            {error&&<div style={{background:`${R}22`,border:`1px solid ${R}44`,borderRadius:12,
              padding:'12px 16px',marginBottom:16,fontSize:14,color:R}}>{error}</div>}

            <button className="btn" onClick={publish} disabled={saving}
              style={{width:'100%',padding:'15px 0',borderRadius:14,fontSize:18,fontWeight:700,
                background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
                boxShadow:`0 8px 28px ${G}55`}}>
              {saving?'Publishing...':'🚀 Publish Set'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
//  PLAY SCREEN
// ═══════════════════════════════════════════════
const TIMER = 25; // seconds per question

function Play({set,onFinish}) {
  const [qi,setQi]=useState(0); // question index
  const [answers,setAnswers]=useState([]); // {correct,given,q}
  const [chosen,setChosen]=useState(null); // selected answer
  const [revealed,setRevealed]=useState(false);
  const [typedVal,setTypedVal]=useState('');
  const [timeLeft,setTimeLeft]=useState(TIMER);
  const [timerKey,setTimerKey]=useState(0);
  const timerRef=useRef(null);

  const q = set.questions[qi];
  const shuffled = useRef(null);

  // shuffle MC options once per question
  if (!shuffled.current || shuffled.current.qid!==q.id) {
    shuffled.current = {qid:q.id, opts:(q.type==='mc'||q.type==='image')?[...q.options].sort(()=>Math.random()-0.5):[]};
  }
  const opts = shuffled.current.opts;

  useEffect(()=>{
    setChosen(null); setRevealed(false); setTypedVal(''); setTimeLeft(TIMER);
    setTimerKey(k=>k+1);
    clearInterval(timerRef.current);
    timerRef.current = setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){clearInterval(timerRef.current);handleReveal(null);return 0;}
        return t-1;
      });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[qi]);

  function handleReveal(given) {
    if(revealed) return;
    clearInterval(timerRef.current);
    setChosen(given);
    setRevealed(true);
    const correct = given!==null && checkAnswer(q,given);
    setAnswers(a=>[...a,{correct,given,q:{...q},opts:[...opts]}]);
  }

  function checkAnswer(q,given) {
    if(q.type==='type') return normalise(given)===normalise(q.answer);
    return given===q.answer;
  }

  function next() {
    if(qi+1>=set.questions.length) {
      onFinish(answers);
    } else {
      shuffled.current=null;
      setQi(i=>i+1);
    }
  }

  const timerPct=(timeLeft/TIMER)*100;
  const timerColor=timerPct>50?G:timerPct>25?Y:R;

  return (
    <div style={{minHeight:'100vh',position:'relative',zIndex:1}}>
      <div style={{maxWidth:560,margin:'0 auto',padding:'20px 16px 60px'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <button className="btn" onClick={()=>onFinish(answers)}
            style={{background:'none',border:'none',color:'#666',fontSize:13,cursor:'pointer',fontFamily:'Fredoka'}}>
            ✕ Quit
          </button>
          <div style={{fontSize:14,fontWeight:600,color:'#aaa'}}>
            {qi+1} / {set.questions.length}
          </div>
          <div style={{fontSize:14,fontWeight:700,color:timerColor,minWidth:36,textAlign:'right',
            animation:timeLeft<=5?'pulse 0.5s ease-in-out infinite':null}}>
            ⏱ {timeLeft}s
          </div>
        </div>

        {/* Progress */}
        <div style={{background:'rgba(255,255,255,0.08)',borderRadius:99,height:5,overflow:'hidden',marginBottom:20}}>
          <div style={{width:`${((qi)/set.questions.length)*100}%`,height:'100%',
            background:`linear-gradient(90deg,${G},${B})`,borderRadius:99,transition:'width 0.5s ease'}} />
        </div>
        {/* Timer bar */}
        <div style={{background:'rgba(255,255,255,0.05)',borderRadius:99,height:4,overflow:'hidden',marginBottom:24}}>
          <div key={timerKey} style={{height:'100%',borderRadius:99,
            background:`linear-gradient(90deg,${timerColor},${timerColor}aa)`,
            animation:`timerDrain ${TIMER}s linear forwards`}} />
        </div>

        {/* Question card */}
        <div className="card" key={q.id} style={{padding:24,marginBottom:16,
          animation:'fadeIn 0.4s ease-out',borderColor:`${QTYPE[q.type].color}33`}}>
          <Badge type={q.type} />

          {(q.type==='image'||q.imageUrl)&&q.imageUrl&&(
            <div style={{marginTop:14,marginBottom:4,borderRadius:12,overflow:'hidden',
              maxHeight:220,display:'flex',justifyContent:'center',background:'rgba(0,0,0,0.3)'}}>
              <img src={q.imageUrl} alt="question" style={{maxWidth:'100%',maxHeight:220,objectFit:'contain'}} />
            </div>
          )}

          <div style={{fontSize:20,fontWeight:600,color:'#fff',marginTop:14,lineHeight:1.5}}>
            {q.question}
          </div>
        </div>

        {/* Answers */}
        {(q.type==='mc'||q.type==='image')&&(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {opts.map((opt,i)=>{
              const isCorrect=opt===q.answer;
              const isChosen=chosen===opt;
              let cls='opt-btn';
              if(revealed){if(isCorrect)cls+=' correct';else if(isChosen&&!isCorrect)cls+=' wrong';}
              const letters=['A','B','C','D'];
              return (
                <button key={i} className={cls} disabled={revealed}
                  onClick={()=>handleReveal(opt)}>
                  <span style={{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',
                    justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0,
                    background:revealed?(isCorrect?G:isChosen?R:'rgba(255,255,255,0.08)'):'rgba(255,255,255,0.1)',
                    color:revealed?(isCorrect?'#0a0a14':isChosen?'#fff':'#666'):'#aaa'}}>
                    {letters[i]}
                  </span>
                  {opt}
                  {revealed&&isCorrect&&<span style={{marginLeft:'auto',fontSize:18}}>✓</span>}
                  {revealed&&isChosen&&!isCorrect&&<span style={{marginLeft:'auto',fontSize:18}}>✗</span>}
                </button>
              );
            })}
          </div>
        )}

        {q.type==='tf'&&(
          <div style={{display:'flex',gap:12}}>
            {['true','false'].map(v=>{
              const isCorrect=v===q.answer;
              const isChosen=chosen===v;
              return (
                <button key={v} className="btn" disabled={revealed}
                  onClick={()=>handleReveal(v)}
                  style={{flex:1,padding:'22px 0',borderRadius:16,fontSize:22,fontWeight:700,
                    fontFamily:'Fredoka',border:'2px solid',
                    background:revealed?(isCorrect?`${G}20`:isChosen?`${R}20`:'rgba(255,255,255,0.04)')
                      :'rgba(255,255,255,0.06)',
                    borderColor:revealed?(isCorrect?G:isChosen?R:'rgba(255,255,255,0.12)')
                      :'rgba(255,255,255,0.12)',
                    color:revealed?(isCorrect?G:isChosen?R:'#666'):'#ddd',
                    cursor:revealed?'default':'pointer',
                    boxShadow:revealed&&isCorrect?`0 0 24px ${G}44`:null}}>
                  {v==='true'?'✓ True':'✗ False'}
                </button>
              );
            })}
          </div>
        )}

        {q.type==='type'&&(
          <div>
            <input className="inp" value={typedVal}
              onChange={e=>setTypedVal(e.target.value)}
              disabled={revealed}
              placeholder="Type your answer..."
              style={{marginBottom:12,fontSize:18,
                borderColor:revealed?(checkAnswer(q,typedVal)?G:R):'rgba(255,255,255,0.12)'}}
              onKeyDown={e=>{if(e.key==='Enter'&&!revealed)handleReveal(typedVal)}} />
            {!revealed&&(
              <button className="btn" onClick={()=>handleReveal(typedVal)} disabled={!typedVal.trim()}
                style={{width:'100%',padding:'14px 0',borderRadius:14,fontSize:17,fontWeight:700,
                  background:`linear-gradient(135deg,${B},${G})`,color:'#fff',
                  opacity:typedVal.trim()?1:0.4}}>Submit</button>
            )}
            {revealed&&(
              <div style={{padding:'14px 18px',borderRadius:14,fontSize:16,fontWeight:600,
                background:checkAnswer(q,typedVal)?`${G}22`:`${R}22`,
                border:`1.5px solid ${checkAnswer(q,typedVal)?G:R}`,
                color:checkAnswer(q,typedVal)?G:R,textAlign:'center'}}>
                {checkAnswer(q,typedVal)?'✓ Correct!':
                  <>✗ Correct answer: <span style={{color:'#fff'}}>{q.answer}</span></>}
              </div>
            )}
          </div>
        )}

        {/* Reveal result + Next */}
        {revealed&&(
          <div style={{marginTop:16,animation:'slideUp 0.35s ease-out'}}>
            {q.type!=='type'&&(
              <div style={{padding:'12px 16px',borderRadius:14,marginBottom:12,textAlign:'center',
                fontSize:16,fontWeight:700,
                background:checkAnswer(q,chosen)?`${G}22`:`${R}22`,
                color:checkAnswer(q,chosen)?G:R}}>
                {chosen===null?`⏱ Time's up! Answer: ${q.answer}`:
                  checkAnswer(q,chosen)?'✓ Correct!':
                  <>✗ Correct: <span style={{color:'#fff'}}>{q.answer}</span></>}
              </div>
            )}
            <button className="btn" onClick={next}
              style={{width:'100%',padding:'14px 0',borderRadius:14,fontSize:17,fontWeight:700,
                background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
                boxShadow:`0 6px 22px ${G}44`,animation:'popIn 0.4s ease-out'}}>
              {qi+1>=set.questions.length?'See Results 🏆':'Next Question →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
//  RESULTS SCREEN
// ═══════════════════════════════════════════════
function Results({set,answers,onHome,onRetry}) {
  const score = answers.filter(a=>a.correct).length;
  const pct = Math.round((score/answers.length)*100);
  const perfect = pct===100;
  const good = pct>=70;

  return (
    <div style={{minHeight:'100vh',position:'relative',zIndex:1}}>
      {perfect&&<Confetti />}
      <div style={{maxWidth:560,margin:'0 auto',padding:'32px 16px 80px'}}>

        {/* Score card */}
        <div className="card" style={{padding:32,textAlign:'center',marginBottom:20,
          background:`linear-gradient(135deg,${good?G:R}12,${B}08)`,
          borderColor:`${good?G:R}44`,animation:'popIn 0.5s ease-out'}}>
          <div style={{fontSize:64,marginBottom:8,animation:'float 3s ease-in-out infinite'}}>
            {perfect?'🏆':good?'🌟':score===0?'😅':'💪'}
          </div>
          <div style={{fontSize:60,fontWeight:700,color:'#fff',lineHeight:1,
            textShadow:`0 0 30px ${good?G:R}88`}}>{pct}%</div>
          <div style={{fontSize:18,color:'#aaa',marginTop:8,marginBottom:4}}>
            {score} / {answers.length} correct
          </div>
          <div style={{fontSize:15,color:good?G:R,fontWeight:600}}>
            {perfect?'Flawless! 🎉':good?'Great job!':score===0?'Keep practising!':'Almost there!'}
          </div>
        </div>

        {/* Breakdown */}
        <div style={{marginBottom:20}}>
          <h3 style={{fontSize:16,color:'#aaa',marginBottom:12}}>Question Breakdown</h3>
          {answers.map((a,i)=>(
            <div key={i} className="card" style={{padding:'12px 16px',marginBottom:8,
              display:'flex',gap:12,alignItems:'flex-start',
              borderColor:`${a.correct?G:R}33`,
              background:a.correct?`${G}08`:`${R}08`,
              animation:`fadeIn 0.4s ease-out ${i*0.06}s both`}}>
              <span style={{fontSize:18,minWidth:28}}>{a.correct?'✅':'❌'}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,color:'#ccc',marginBottom:3}}>{a.q.question}</div>
                {!a.correct&&<div style={{fontSize:13,color:G}}>Correct: {a.q.answer}</div>}
                {a.given&&!a.correct&&<div style={{fontSize:13,color:R}}>Your answer: {a.given}</div>}
                {a.given===null&&<div style={{fontSize:13,color:Y}}>⏱ Timed out</div>}
              </div>
              <Badge type={a.q.type} />
            </div>
          ))}
        </div>

        <div style={{display:'flex',gap:12}}>
          <button className="btn" onClick={onRetry}
            style={{flex:1,padding:'14px 0',borderRadius:14,fontSize:17,fontWeight:700,
              background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
              boxShadow:`0 6px 22px ${G}44`}}>🔄 Play Again</button>
          <button className="btn" onClick={onHome}
            style={{flex:1,padding:'14px 0',borderRadius:14,fontSize:17,fontWeight:700,
              background:'rgba(255,255,255,0.08)',color:'#ddd',
              border:'1px solid rgba(255,255,255,0.12)'}}>← Browse Sets</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
//  PUBLISHED SCREEN
// ═══════════════════════════════════════════════
function Published({set,onHome,onPlay}) {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      padding:20,position:'relative',zIndex:1}}>
      <Confetti />
      <div style={{maxWidth:440,width:'100%',textAlign:'center',animation:'popIn 0.5s ease-out'}}>
        <div style={{fontSize:64,marginBottom:12,animation:'float 3s ease-in-out infinite'}}>🚀</div>
        <div style={{fontSize:28,fontWeight:700,color:'#fff',marginBottom:8}}>Set Published!</div>
        <div style={{fontSize:15,color:'#888',marginBottom:24}}>Your set is live and ready to play.</div>

        <div className="card" style={{padding:20,marginBottom:24,
          background:`linear-gradient(135deg,${G}12,${B}08)`,borderColor:`${G}44`}}>
          <div style={{fontSize:40,marginBottom:6}}>{set.emoji}</div>
          <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{set.title}</div>
          <div style={{fontSize:14,color:'#888',marginTop:4}}>{set.questions.length} questions</div>
        </div>

        <div style={{display:'flex',gap:12}}>
          <button className="btn" onClick={onPlay}
            style={{flex:1,padding:'15px 0',borderRadius:14,fontSize:17,fontWeight:700,
              background:`linear-gradient(135deg,${G},${B})`,color:'#fff',
              boxShadow:`0 6px 22px ${G}44`}}>▶ Play Now</button>
          <button className="btn" onClick={onHome}
            style={{flex:1,padding:'15px 0',borderRadius:14,fontSize:17,fontWeight:700,
              background:'rgba(255,255,255,0.08)',color:'#ddd',
              border:'1px solid rgba(255,255,255,0.12)'}}>Browse Sets</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════
function App() {
  const [screen,setScreen]=useState('home'); // home | create | play | results | published
  const [sets,setSets]=useState(DEMO_SETS);
  const [loading,setLoading]=useState(false);
  const [username,setUsername]=useState(()=>localStorage.getItem('gg_user')||'');
  const [activeSet,setActiveSet]=useState(null);
  const [answers,setAnswers]=useState([]);

  useEffect(()=>{
    if(SUPABASE_ANON==='YOUR_ANON_KEY_HERE'||!db) return; // demo mode
    setLoading(true);
    db.from('study_sets').select('*').order('created_at',{ascending:false}).then(({data,error})=>{
      if(!error&&data&&data.length>0) setSets(data);
      setLoading(false);
    });
  },[]);

  function handleUsername(u) {
    setUsername(u);
    localStorage.setItem('gg_user',u);
  }

  function handlePlay(set) {
    setActiveSet(set);
    setAnswers([]);
    if(db&&SUPABASE_ANON!=='YOUR_ANON_KEY_HERE') {
      db.from('study_sets').update({play_count:(set.play_count||0)+1}).eq('id',set.id).then(()=>{});
    }
    setScreen('play');
  }

  function handleFinish(ans) {
    setAnswers(ans);
    setScreen('results');
  }

  function handlePublish(set) {
    setSets(s=>[set,...s.filter(x=>!x.id.startsWith('local_'))]);
    setActiveSet(set);
    setScreen('published');
  }

  if(screen==='create')
    return <Create username={username} onBack={()=>setScreen('home')} onPublish={handlePublish} />;

  if(screen==='play'&&activeSet)
    return <Play set={activeSet} onFinish={handleFinish} />;

  if(screen==='results'&&activeSet)
    return <Results set={activeSet} answers={answers}
      onHome={()=>setScreen('home')} onRetry={()=>handlePlay(activeSet)} />;

  if(screen==='published'&&activeSet)
    return <Published set={activeSet}
      onHome={()=>setScreen('home')} onPlay={()=>handlePlay(activeSet)} />;

  return <Home sets={sets} loading={loading} username={username}
    onUsername={handleUsername} onCreate={()=>setScreen('create')} onPlay={handlePlay} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
